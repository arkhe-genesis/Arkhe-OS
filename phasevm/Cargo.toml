[package]
name = "phasevm"
version = "0.1.0"
edition = "2021"
description = "JIT compiler for topological bytecode (Substrate 93 cbytes)"
license = "MIT"
repository = "https://github.com/arkhe/phasevm"

[dependencies]
cranelift = "0.98"
cranelift-jit = "0.98"
cranelift-native = "0.98"
cranelift-module = "0.98"
num-complex = "0.4"
sha2 = "0.10"
thiserror = "1.0"
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }

[lib]
crate-type = ["cdylib", "rlib"]  # For Python FFI via PyO3 if needed

[profile.release]
opt-level = 3
lto = true

[features]
python = ["pyo3"]
