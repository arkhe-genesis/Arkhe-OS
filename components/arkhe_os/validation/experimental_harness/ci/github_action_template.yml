name: Arkhe OS Experimental Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Arkhe OS
      run: |
        pip install arkhe-os[validation,plotly,h5py,scipy]
    - name: Run Validation
      run: |
        arkhe validate cve susceptibility ./experiments/data.h5 --sign
