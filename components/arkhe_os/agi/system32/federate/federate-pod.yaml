apiVersion: v1
kind: Pod
metadata:
  name: arkhe-federate-pod
  labels:
    app: arkhe-federate
spec:
  restartPolicy: Always
  securityContext:
    runAsUser: 1000
  volumes:
    - name: federation-config
      hostPath:
        path: /etc/agi/federation
    - name: federation-data
      hostPath:
        path: /var/lib/agi/federation
  containers:
    - name: federate-daemon
      image: ghcr.io/arkhe-os/agi-federate:latest
      command: ["python3", "-m", "arkhe-federate"]
      env:
        - name: FEDERATE_CONFIG
          value: "/etc/agi/federation/federation.yaml"
      ports:
        - containerPort: 9876
          protocol: TCP
      volumeMounts:
        - name: federation-config
          mountPath: /etc/agi/federation
        - name: federation-data
          mountPath: /var/lib/agi/federation
    - name: tor-sidecar
      image: ghcr.io/arkhe-os/tor-sidecar:latest
