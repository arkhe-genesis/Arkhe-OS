apiVersion: containerservice.azure.com/v1  # Exemplo para AKS; adaptar para GKE/EKS
kind: NodePool
metadata:
  name: cuda-h100
  namespace: arkhe-system
spec:
  count: 8
  vmSize: Standard_ND96amsr_A100_v4  # 8x A100 80GB por nó
  osType: Linux
  mode: User
  nodeLabels:
    nvidia.com/gpu.present: "true"
    nvidia.com/gpu.count: "8"
    nvidia.com/gpu.product: "NVIDIA-A100-SXM4-80GB"
    arkhe.io/cuda.compute: "8.0"
    arkhe.io/nccl.version: "2.18"
  nodeTaints:
  - key: nvidia.com/gpu
    value: "true"
    effect: NoSchedule
