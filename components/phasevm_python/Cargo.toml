[package]
name = "phasevm_python"
version = "0.1.0"
edition = "2021"
description = "Python bindings for PhaseVM Async JIT"

[lib]
name = "phasevm_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
phasevm = { path = "../phasevm" }
num-complex = "0.4"
