[package]
name = "counter"
version = "0.1.0"
edition = "2021"

[dependencies]

anchor-lang = "0.30.1"

nexus-sdk = { workspace = true, optional = true }
nexus-core = { workspace = true, optional = true }
nexus-network = { workspace = true, optional = true }

[lib]
crate-type = ["cdylib", "lib"]
[features]
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]
