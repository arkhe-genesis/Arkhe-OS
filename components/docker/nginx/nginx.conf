user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Tratamento do header Φ-REP ausente
    map $http_x_phi_rep $phi_rep_value {
        default        "0.0";
        ""             "0.0";
        "~^0\.[0-9]+"  "$http_x_phi_rep";
        "~^[1-9]"      "1.0";
    }

    log_format cathedral_json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"user_agent":"$http_user_agent",'
        '"phi_rep":"$phi_rep_value",'
        '"kym_seal":"$http_x_kym_seal",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log cathedral_json;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate‑limiting por Φ‑REP (3 zonas)
    limit_req_zone $binary_remote_addr zone=api_high:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_medium:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_low:10m rate=5r/s;

    # Mapear Φ-REP para zona
    map $http_x_phi_rep $selected_rate_zone {
        "~^0\.[8-9]" "api_high";
        "~^0\.[5-7]" "api_medium";
        default        "api_low";
    }

    # TLS Soberano
    ssl_protocols TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers on;

    # Forward secrecy perfeita
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    upstream arkhe_backend {
        server node-backend:3000;
        keepalive 32;
    }

    upstream arkhe_ws {
        server node-backend:3001;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
