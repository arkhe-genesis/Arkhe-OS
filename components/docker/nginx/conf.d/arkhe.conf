server {
    listen 80;
    server_name api.arkhe.local;

    # Headers de Segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # REST API
    location /api/ {
        proxy_pass http://arkhe_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers ARKHE para downstream
        proxy_set_header X-Phi-Rep $phi_rep_value;
        proxy_set_header X-Kym-Seal $http_x_kym_seal;
        proxy_set_header X-Cathedral-Substrate "5028";

        limit_req zone=api_medium burst=10 nodelay;
    }

    # Health Check (Restricted)
    location /health {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://arkhe_backend/health;
    }

    # tRPC
    location /trpc {
        proxy_pass http://arkhe_backend;
    }

    # GraphQL
    location /graphql {
        proxy_pass http://arkhe_backend/graphql;
    }

    # Swagger
    location /api-docs {
        proxy_pass http://arkhe_backend/api-docs;
    }

    # WebSockets (Socket.IO)
    location /socket.io/ {
        proxy_pass http://arkhe_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Phi-Rep $phi_rep_value;
        proxy_set_header X-Kym-Seal $http_x_kym_seal;

        proxy_read_timeout 86400;
        limit_req zone=api_low burst=5 nodelay;
    }
}
