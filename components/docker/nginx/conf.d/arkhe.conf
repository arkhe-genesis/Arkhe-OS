server {
    listen 80;
    server_name api.arkhe.local;

    # REST API
    location /api/ {
        proxy_pass http://arkhe_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health Check
    location /health {
        proxy_pass http://arkhe_backend/health;
    }

    # tRPC
    location /trpc {
        proxy_pass http://arkhe_backend;
    }

    # GraphQL
    location /graphql {
        proxy_pass http://arkhe_backend/graphql;
    }

    # Swagger
    location /api-docs {
        proxy_pass http://arkhe_backend/api-docs;
    }

    # WebSockets (Socket.IO)
    location /socket.io/ {
        proxy_pass http://arkhe_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
