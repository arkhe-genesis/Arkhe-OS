openapi: 3.0.3
info:
  title: Archimedes-Ω Agent API
  description: |
    API for the Archimedes-Ω coherence interrogation agent.
    Provides endpoints for simulating quantum coherence under SU(2), SL(3,ℤ), W‑state,
    Rainbow (energy-dependent), Collective (Kuramoto), and Xenoactualization models.
  version: 4.0.0
    Provides endpoints for simulating quantum coherence under SU(2) (continuous),
    SL(3,ℤ) (discrete), W‑state (multipartite entanglement), and Rainbow (energy-dependent) models.
    Detects resonance peaks and assesses teleportation readiness.
  version: 2.5.0
  contact:
    name: Arkhe Consortium
    url: https://github.com/arkhe/archimedes-agent
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: simulation
    description: Coherence model simulations
  - name: synchronization
    description: Multi-node synchronization models
  - name: xenoactualization
    description: Virtual-to-physical blueprint conversion
  - name: detection
    description: Peak detection and analysis
  - name: analysis
    description: Complete pipeline (simulation + detection + conclusion)
  - name: teleportation
    description: W‑state and teleportation resource assessment
  - name: therapy
    description: Protocol optimization and real-time monitoring

paths:
  /simulate/su2:
    post:
      summary: Simulate SU(2) continuous coherence
      operationId: simulateSU2
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SU2Request'
      responses:
        '200':
          description: Successful simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoherenceResponse'

  /simulate/sl3z:
    post:
      summary: Simulate SL(3,ℤ) discrete coherence
      operationId: simulateSL3Z
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SL3ZRequest'
      responses:
        '200':
          description: Successful simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoherenceResponse'

  /simulate/wstate:
    post:
      summary: Simulate W‑state coherence
      operationId: simulateWState
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WStateRequest'
      responses:
        '200':
          description: Successful simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoherenceResponse'

  /simulate/fibonacci-braid:
    post:
      summary: Assess Fibonacci braid realization feasibility
      operationId: simulateFibonacciBraid
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FibonacciRequest'
      responses:
        '200':
          description: Braid simulation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FibonacciResponse'

  /simulate/rainbow-coherence:
    post:
      summary: Simulate Rainbow metric deformation
      operationId: simulateRainbowCoherence
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RainbowRequest'
      responses:
        '200':
          description: Rainbow coherence result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RainbowResponse'

  /synchro/collective_coherence:
    post:
      summary: Simulate Kuramoto synchronization for collective coherence
      operationId: simulateCollectiveCoherence
      tags: [synchronization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiveCoherenceRequest'
      responses:
        '200':
          description: Collective coherence result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiveCoherenceResponse'

  /simulate/xenoactualization:
    post:
      summary: Simulate xenoactualization fidelity with Zeno dynamics
      operationId: simulateXenoactualization
      tags: [xenoactualization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/XenoactualizationRequest'
      responses:
        '200':
          description: Xenoactualization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XenoactualizationResponse'

  /simulate/xenoactualization/scan:
    post:
      summary: Scans measurement rate to find optimal for maximum fidelity
      operationId: scanXenoactualization
      tags: [xenoactualization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/XenoactualizationRequest'
      responses:
        '200':
          description: Scan results

  /simulate/rainbow-coherence:
    post:
      summary: Simulate Rainbow metric deformation
      description: |
        Computes coherence deformation based on probe energy (THz/eV).
        Implements the Rainbow Principle where Cartan peaks shift with energy.
      operationId: simulateRainbowCoherence
      tags: [simulation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RainbowRequest'
      responses:
        '200':
          description: Rainbow coherence result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RainbowResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /detect/peaks:
    post:
      summary: Detect coherence peaks
      operationId: detectPeaks
      tags: [detection]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeakDetectionRequest'
      responses:
        '200':
          description: Peak detection results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakDetectionResponse'

  /detect/rainbow-peaks:
    post:
      summary: Detect Rainbow-shifted resonance peaks
      operationId: detectRainbowPeaks
      tags: [detection]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeakDetectionRequest'
      responses:
        '200':
          description: Rainbow peak detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RainbowPeakResponse'

  /detect/rainbow-peaks:
    post:
      summary: Detect Rainbow-shifted resonance peaks
      description: |
        Identifies peaks in coherence data and classifies them according to
        their shift from the base Cartan resonances (π/5, 2π/3).
      operationId: detectRainbowPeaks
      tags: [detection]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeakDetectionRequest'
      responses:
        '200':
          description: Rainbow peak detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RainbowPeakResponse'
        '400':
          description: Invalid input
        '500':
          description: Internal server error

  /analyze:
    post:
      summary: Full analysis pipeline
      operationId: analyze
      tags: [analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /analyze/teleportation-resource:
    post:
      summary: Assess teleportation resource (W‑state readiness)
      operationId: checkTeleportationResource
      tags: [teleportation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeleportationRequest'
      responses:
        '200':
          description: Teleportation resource assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeleportationResponse'

  /therapy/optimize-combined-protocol:
    post:
      summary: Otimiza intervalo entre LIPUS e administração de fármaco
      description: |
        Calcula o intervalo ótimo entre a aplicação de LIPUS (Low-Intensity Pulsed Ultrasound)
        e a administração de um fármaco para maximizar a absorção cerebral via abertura
        da barreira hematoencefálica. Utiliza um modelo de farmacocinética cruzado com
        a dinâmica de permeabilidade induzida por microbolhas.
      operationId: optimizeCombinedProtocol
      tags: [therapy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizationRequest'
      responses:
        '200':
          description: Intervalo ótimo e absorção prevista

  /therapy/monitoring:
    get:
      summary: WebSocket para monitoramento em tempo real da limpeza glinfática
      description: |
        Endpoint de WebSocket que fornece telemetria em tempo real sobre a eficiência
        da limpeza glinfática baseada em dados de coerência FRET. Permite o ajuste
        dinâmico de parâmetros terapêuticos e a detecção de assinaturas de tranças
        de Fibonacci no citoesqueleto durante o processo de monitoramento.
      responses:
        '101':
          description: WebSocket connection upgraded

components:
  schemas:
    SU2Request:
      type: object
      properties:
        theta_range:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
        num_points:
          type: integer
        thermal_noise:
          type: number
        temperature:
          type: number
      required: [theta_range, num_points]

    SL3ZRequest:
      type: object
      properties:
        theta_range:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
        num_points:
          type: integer
        words:
          type: array
          items:
            type: string
      required: [theta_range, num_points]

    WStateRequest:
      type: object
      properties:
        nodes:
          type: integer
        loss_probability:
          type: number
        theta_range:
          type: array
          items:
            type: number
        num_points:
          type: integer
      required: [nodes]

    FibonacciRequest:
      type: object
      properties:
        dalpha: {type: number}
        epsilon: {type: number}
        eta: {type: number}
        lambda: {type: number}

    FibonacciResponse:
      type: object
      properties:
        braid_fidelity: {type: number}
        leakage_probability: {type: number}
        gamma5: {type: number}
        admissible: {type: boolean}
        recommendation: {type: string}

    RainbowRequest:
      type: object
      properties:
        energy_thz:
          type: number
          description: Frequência de Proba (THz) para o Princípio Rainbow
          description: Probe frequency in THz
          minimum: 1.0
          maximum: 1000.0
          default: 10.0
        num_points:
          type: integer
          description: Número de pontos na simulação de fase
          default: 1000
        resonance_scale:
          type: number
          description: Escalonamento da amplitude das ressonâncias
          default: 1.0
      required: [energy_thz]
          description: Number of points in coherence curve
          default: 1000
        resonance_scale:
          type: number
          description: Multiplier for resonance intensity
          default: 1.0
      required:
        - energy_thz

    RainbowResponse:
      type: object
      properties:
        energy_ev: {type: number}
        rainbow_factor: {type: number}
        phases: {type: array, items: {type: number}}
        coherence: {type: array, items: {type: number}}
        shifted_peaks: {type: object}
        regime: {type: string}
        philosophical_note: {type: string}

    CollectiveCoherenceRequest:
      type: object
      properties:
        nodes:
          type: array
          items:
        energy_ev:
          type: number
          description: Energy in electronvolts
        rainbow_factor:
          type: number
          description: Metric deformation factor f(E)
        phases:
          type: array
          items:
            type: number
        coherence:
          type: array
          items:
            type: number
        shifted_peaks:
          type: object
          properties:
            fibonacci_shift_deg:
              type: number
            wstate_shift_deg:
              type: number
        regime:
          type: string
          enum: [SUB_RESSONANT, TRANSITION, HIGH_ENERGY]
        philosophical_note:
          type: string
      required:
        - energy_ev
        - rainbow_factor
        - phases
        - coherence
        - shifted_peaks
        - regime
        - philosophical_note

    CoherenceResponse:
      type: object
      properties:
        energy_thz: {type: number}
        num_points: {type: integer}
        resonance_scale: {type: number}
      required: [energy_thz]

    RainbowResponse:
      type: object
      properties:
        energy_ev: {type: number}
        rainbow_factor: {type: number}
        phases: {type: array, items: {type: number}}
        coherence: {type: array, items: {type: number}}
        shifted_peaks: {type: object}
        regime: {type: string}
        philosophical_note: {type: string}

    CollectiveCoherenceRequest:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeState'
        coupling_K: {type: number}
        time_horizon: {type: number}
        dt: {type: number}
        fusion_threshold: {type: number}
        stabilization_time: {type: number}
        method: {type: string}
      required: [nodes]

    NodeState:
      type: object
      properties:
        phase: {type: number}
        natural_freq: {type: number}
        weight: {type: number}
      required: [phase, natural_freq]

    CollectiveCoherenceResponse:
      type: object
      properties:
        final_R: {type: number}
        final_phase: {type: number}
        is_fused: {type: boolean}
        time_to_fusion: {type: number}
        trajectory: {type: array, items: {type: number}}
        interpretation: {type: string}
        philosophical_note: {type: string}

    XenoactualizationRequest:
      type: object
      properties:
        coherence_profile: {type: array, items: {type: number}}
        blueprint_complexity: {type: number}
        measurement_rate: {type: number}
        tau_field_strength: {type: number}
        domain: {type: string}
      required: [coherence_profile, blueprint_complexity]

    XenoactualizationResponse:
      type: object
      properties:
        fidelity: {type: number}
        zeno_suppression: {type: number}
        coherence_factor: {type: number}
        complexity_penalty: {type: number}
        stability_score: {type: number}
        collapse_time_estimate: {type: number}
        domain_result: {type: string}
        recommendation: {type: string}
        philosophical_note: {type: string}

    CoherenceResponse:
      type: object
      properties:
        phases: {type: array, items: {type: number}}
        coherence: {type: array, items: {type: number}}

    PeakDetectionRequest:
      type: object
      properties:
        phases: {type: array, items: {type: number}}
        coherence: {type: array, items: {type: number}}
        threshold_multiplier: {type: number}
        min_prominence: {type: number}
        threshold: {type: number}
      required: [phases, coherence]
        phases:
          type: array
          items:
            type: number
            format: double
        coherence:
          type: array
          items:
            type: number
            format: double
        threshold_multiplier:
          type: number
          default: 1.2
          minimum: 0
        min_prominence:
          type: number
          default: 0.05
          minimum: 0
        threshold:
          type: number
          description: Threshold for peak detection (used in rainbow detection)
          default: 0.3
      required:
        - phases
        - coherence

    PeakInfo:
      type: object
      properties:
        phase: {type: number}
        phase_degrees: {type: number}
        coherence: {type: number}
        prominence: {type: number}
        is_resonance: {type: boolean}
        fivefold_deviation_rad: {type: number}
        index: {type: integer}
        shift_from_base: {type: number}
        peak_type: {type: string}
        phase:
          type: number
          format: double
        phase_degrees:
          type: number
          format: double
        coherence:
          type: number
          format: double
        prominence:
          type: number
          format: double
        is_resonance:
          type: boolean
          description: True if peak coincides with a π/5 harmonic.
        fivefold_deviation_rad:
          type: number
          format: double
          description: Deviation from the nearest π/5 harmonic.
        index:
          type: integer
        shift_from_base:
          type: number
          description: Shift in degrees from base Cartan resonance
        peak_type:
          type: string
          enum: [FIBONACCI, W_STATE, UNKNOWN]
      required:
        - phase
        - coherence

    PeakDetectionResponse:
      type: object
      properties:
        peaks:
          type: array
          items:
            $ref: '#/components/schemas/PeakInfo'

    RainbowPeakResponse:
      type: object
      properties:
        peaks:
          type: array
          items:
            $ref: '#/components/schemas/PeakInfo'
        dominant_regime:
          type: string
        interpretation:
          type: string
      required:
        - peaks
        - dominant_regime
        - interpretation

    RainbowPeakResponse:
      type: object
      properties:
        peaks:
          type: array
          items:
            $ref: '#/components/schemas/PeakInfo'
        dominant_regime: {type: string}
        interpretation: {type: string}

    TeleportationRequest:
      type: object
      properties:
        phases: {type: array, items: {type: number}}
        coherence: {type: array, items: {type: number}}
        nodes: {type: integer}
        loss_probability: {type: number}
      required: [phases, coherence]

    TeleportationResponse:
      type: object
      properties:
        resource_type: {type: string}
        teleportation_ready: {type: boolean}
        robustness_score: {type: number}
        has_2pi3_resonance: {type: boolean}
        status: {type: string}
        interpretation: {type: string}
        philosophical_note: {type: string}

    OptimizationRequest:
      type: object
      properties:
        t_peak:
          type: number
          description: Tempo até pico de abertura da BBE (min)
          default: 30.0
        t_decay:
          type: number
          description: Constante de decaimento da permeabilidade (min)
          default: 60.0
        drug_halflife:
          type: number
          description: Meia-vida do fármaco na corrente sanguínea (min)
          default: 120.0
        microbubbles:
          type: boolean
          description: Uso de microbolhas para potencializar abertura
          default: true
        mi:
          type: number
          description: Mechanical Index (0.1-0.6)
          minimum: 0.1
          maximum: 0.6
          default: 0.4
        t_peak: {type: number}
        t_decay: {type: number}
        drug_halflife: {type: number}
        microbubbles: {type: boolean}
        mi: {type: number}

    AnalysisRequest:
      type: object
      properties:
        data_source: {type: string}
        su2_params: {$ref: '#/components/schemas/SU2Request'}
        sl3z_params: {$ref: '#/components/schemas/SL3ZRequest'}
        w_state_params: {$ref: '#/components/schemas/WStateRequest'}
        detection_params: {type: object}
        experimental_data: {type: object}
      required: [data_source]

    Conclusion:
      type: object
      properties:
        status: {type: string}
        peaks_total: {type: integer}
        peaks_in_resonance: {type: integer}
        max_coherence: {type: number}
        experimental_gamma5: {type: number}
        interpretation: {type: string}
        philosophical_note: {type: string}

    AnalysisResponse:
      type: object
      properties:
        id: {type: string}
        timestamp: {type: string}
        data_source: {type: string}
        peaks: {type: array, items: {$ref: '#/components/schemas/PeakInfo'}}
        conclusion: {$ref: '#/components/schemas/Conclusion'}
        output_file: {type: string}
