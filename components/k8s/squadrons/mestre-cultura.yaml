apiVersion: v1
kind: ConfigMap
metadata:
  name: mestre-cultura-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "culture"
  PRIMARY_MODEL: "llama-gamma"
  MODEL_RATIO: "0.3,0.1,0.6"
  LEASE_TTL: "86400"
  ALLOWED_OPCODES: "0x161,0x19F,0x112,0x1A0,0x151"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mestre-cultura
  namespace: arkhe
  labels:
    squadron: mestre-cultura
    role: training
spec:
  serviceName: mestre-cultura
  replicas: 1
  selector:
    matchLabels:
      squadron: mestre-cultura
  template:
    metadata:
      labels:
        squadron: mestre-cultura
    spec:
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        - name: LLAMA_ENDPOINT
          value: "http://llama-response.arkhe.svc.cluster.local:8000"
        envFrom:
        - configMapRef:
            name: mestre-cultura-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 30
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mestre-cultura
  namespace: arkhe
spec:
  selector:
    squadron: mestre-cultura
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
