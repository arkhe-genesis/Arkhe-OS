apiVersion: v1
kind: ConfigMap
metadata:
  name: guarda-catedral-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "guardian"
  PRIMARY_MODEL: "claude-alpha"
  MODEL_RATIO: "0.6,0.2,0.2"  # Claude/Qwen/Llama
  LEASE_TTL: "300"
  ALLOWED_OPCODES: "0x1B4,0x193,0x1F8,0x1AC,0x0C1"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: guarda-catedral
  namespace: arkhe
  labels:
    squadron: guarda-catedral
    role: governance
spec:
  serviceName: guarda-catedral
  replicas: 1
  selector:
    matchLabels:
      squadron: guarda-catedral
  template:
    metadata:
      labels:
        squadron: guarda-catedral
    spec:
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: cathedral-secrets
              key: claude-api-key
        envFrom:
        - configMapRef:
            name: guarda-catedral-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 30
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 10
        volumeMounts:
        - name: audit-data
          mountPath: /var/lib/audit
  volumeClaimTemplates:
  - metadata:
      name: audit-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: guarda-catedral
  namespace: arkhe
spec:
  selector:
    squadron: guarda-catedral
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
