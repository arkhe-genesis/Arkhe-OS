apiVersion: v1
kind: ConfigMap
metadata:
  name: iota-cronografo-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "collider-physics"
  PRIMARY_MODEL: "claude-3.5"
  ALLOWED_OPCODES: "0x270,0x271,0x272,0x273,0x274"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iota-cronografo
  namespace: arkhe
  labels:
    squadron: iota-cronografo
    role: physics
spec:
  replicas: 2
  selector:
    matchLabels:
      squadron: iota-cronografo
  template:
    metadata:
      labels:
        squadron: iota-cronografo
    spec:
      containers:
      - name: collider-engine
        image: cathedral/squadron-base:v1.0.0
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        envFrom:
        - configMapRef:
            name: iota-cronografo-config
        resources:
          limits:
            memory: "8Gi"
            cpu: "4"
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
