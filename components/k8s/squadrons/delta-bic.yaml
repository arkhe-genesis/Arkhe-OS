apiVersion: v1
kind: ConfigMap
metadata:
  name: delta-bic-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "quasi-bound-states-hunter"
  PRIMARY_MODEL: "claude-3.5"
  MODEL_RATIO: "0.5,0.4,0.1"
  LEASE_TTL: "60"
  ALLOWED_OPCODES: "0x22C,0x22D,0x22E,0x22F"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: delta-bic
  namespace: arkhe
  labels:
    squadron: delta-bic
    role: resonance-hunting
spec:
  serviceName: delta-bic
  replicas: 3
  selector:
    matchLabels:
      squadron: delta-bic
  template:
    metadata:
      labels:
        squadron: delta-bic
    spec:
      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-A100-SXM4-80GB"
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        envFrom:
        - configMapRef:
            name: delta-bic-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "32Gi"
            cpu: "8000m"
            nvidia.com/gpu: 2
          limits:
            memory: "64Gi"
            cpu: "16000m"
            nvidia.com/gpu: 2
---
apiVersion: v1
kind: Service
metadata:
  name: delta-bic
  namespace: arkhe
spec:
  selector:
    squadron: delta-bic
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
