apiVersion: v1
kind: ConfigMap
metadata:
  name: cacador-vuln-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "hunter"
  PRIMARY_MODEL: "claude-alpha"
  MODEL_RATIO: "0.4,0.5,0.1"
  LEASE_TTL: "3600"
  ALLOWED_OPCODES: "0x0CB,0x135,0x15E,0x16C,0x0D5"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cacador-vuln
  namespace: arkhe
  labels:
    squadron: cacador-vuln
    role: hunting
spec:
  serviceName: cacador-vuln
  replicas: 1
  selector:
    matchLabels:
      squadron: cacador-vuln
  template:
    metadata:
      labels:
        squadron: cacador-vuln
    spec:
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: cathedral-secrets
              key: claude-api-key
        envFrom:
        - configMapRef:
            name: cacador-vuln-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 30
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 10
        volumeMounts:
        - name: vuln-data
          mountPath: /var/lib/vuln
  volumeClaimTemplates:
  - metadata:
      name: vuln-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 30Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cacador-vuln
  namespace: arkhe
spec:
  selector:
    squadron: cacador-vuln
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
