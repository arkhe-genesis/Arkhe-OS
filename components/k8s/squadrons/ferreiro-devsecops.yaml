apiVersion: v1
kind: ConfigMap
metadata:
  name: ferreiro-devsecops-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "devsecops"
  PRIMARY_MODEL: "qwen-beta"
  MODEL_RATIO: "0.3,0.5,0.2"
  LEASE_TTL: "60"
  ALLOWED_OPCODES: "0x13A,0x129,0x0C2,0x129,0x150"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ferreiro-devsecops
  namespace: arkhe
  labels:
    squadron: ferreiro-devsecops
    role: devsecops
spec:
  serviceName: ferreiro-devsecops
  replicas: 1
  selector:
    matchLabels:
      squadron: ferreiro-devsecops
  template:
    metadata:
      labels:
        squadron: ferreiro-devsecops
    spec:
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        - name: QWEN_ENDPOINT
          value: "http://qwen-tool.arkhe.svc.cluster.local:8000"
        envFrom:
        - configMapRef:
            name: ferreiro-devsecops-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 30
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 10
        volumeMounts:
        - name: build-cache
          mountPath: /var/cache/build
  volumeClaimTemplates:
  - metadata:
      name: build-cache
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ferreiro-devsecops
  namespace: arkhe
spec:
  selector:
    squadron: ferreiro-devsecops
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
