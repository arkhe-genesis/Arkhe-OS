apiVersion: v1
kind: Service
metadata:
  name: arkhen-service
  namespace: arkhen-system
  labels:
    app: arkhen-core
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: arkhen-core
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arkhen-ingress
  namespace: arkhen-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Multi-cloud global load balancing annotations would go here
    # e.g., external-dns.alpha.kubernetes.io/hostname: arkhen.global.network
spec:
  tls:
  - hosts:
    - api.arkhen.network
    secretName: arkhen-tls-secret
  rules:
  - host: api.arkhen.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: arkhen-service
            port:
              number: 80
