# weaviate-values.yaml
# Arkhe-Block Vector Memory Configuration
image:
  tag: 1.24.1
  registry: cr.weaviate.io
  repo: weaviate
service:
  type: LoadBalancer
  port: 80
  nodePort: 30080
persistence:
  enabled: true
  size: 32Gi
  storageClassName: default
env:
  AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
  PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
  QUERY_DEFAULTS_LIMIT: 25
  TRACK_VECTOR_DIMENSIONS: 'true'
  ENABLE_MODULES: 'text2vec-openai,backup-s3'
  OPENAI_APIKEY: '' # To be set via secret
  CLUSTER_HOSTNAME: 'weaviate-cluster'
