# torrc.d/arkhe-onion.conf — Configuração do serviço hidden ARKHE OS

# Configurações básicas de privacidade
AvoidDiskWrites 1
DisableNetwork 0
Log notice file /home/tor/tor/log

# Configurações de rede isolada (para sidecar)
SocksPort 9050
ControlPort 9051
CookieAuthentication 1
CookieAuthFileGroupReadable 1
DataDirectory /home/tor/tor/data

# Hidden Service v3 com autenticação de cliente (stealth mode)
HiddenServiceDir /home/tor/tor/onion/arkhe-agi
HiddenServiceVersion 3
HiddenServicePort 80 127.0.0.1:5000
HiddenServicePort 443 127.0.0.1:5000
HiddenServicePort 9090 127.0.0.1:9090

# Autenticação de cliente: apenas chaves autorizadas podem acessar
# Formato: HiddenServiceAuthorizeClient stealth client1,client2,...
# As chaves são geradas via `generate-client.sh` e colocadas em client-keys/
HiddenServiceAuthorizeClient stealth arkhe-admin,arkhe-peer,arkhe-public

# Proteção contra abuso
HiddenServiceMaxStreams 100
HiddenServiceMaxStreamsCloseCircuit 200

# Opcional: bridge para contornar censura (descomentar se necessário)
# UseBridges 1
# ClientTransportPlugin obfs4 exec /usr/bin/obfs4proxy