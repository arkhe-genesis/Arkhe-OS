# /etc/nginx/nginx.conf — ARKHE OS Sovereign Gateway
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # ─── Logs estruturados para auditoria ─────────────────
    log_format cathedral_json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"user_agent":"$http_user_agent",'
        '"phi_rep":"$http_x_phi_rep",'
        '"kym_seal":"$http_x_kym_seal"'
    '}';

    access_log /var/log/nginx/access.log cathedral_json;

    # ─── Rate limiting baseado em Φ‑REP ────────────────────
    map $http_x_phi_rep $phi_rate_limit {
        "~^0\.[8-9]" "100r/s";
        "~^0\.[5-7]" "20r/s";
        default        "5r/s";
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=lowphi:10m rate=5r/s;

    # ─── TLS Soberano ────────────────────────────────────
    ssl_protocols TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Upstream para o Nexus ────────────────────────────
    upstream nexus_backend {
        server 127.0.0.1:9090;       # FastAPI
        keepalive 32;
    }

    # ─── Servidor principal ──────────────────────────────
    server {
        listen 443 ssl http2;
        server_name cathedral.arkhe.os;

        ssl_certificate     /etc/letsencrypt/live/cathedral/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cathedral/privkey.pem;

        # ─── Dashboard estático ──────────────────────────
        location / {
            root   /var/www/nexus;
            index  index.html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ─── API do Nexus ────────────────────────────────
        location /api/ {
            proxy_pass http://nexus_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            limit_req zone=api burst=20 nodelay;
        }

        # ─── WebSocket para eventos em tempo real ────────
        location /ws/ {
            proxy_pass http://nexus_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ─── Healthcheck ─────────────────────────────────
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # ─── Redirecionamento HTTP → HTTPS ──────────────────
    server {
        listen 80;
        server_name cathedral.arkhe.os;
        return 301 https://$host$request_uri;
    }
}
