[package]
name = "arkhe_stark_rust"
version = "0.1.0"
edition = "2021"

[lib]
name = "arkhe_stark_rust"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
winterfell = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
winter-prover = "0.8.3"

nexus-sdk = { workspace = true, optional = true }
nexus-core = { workspace = true, optional = true }
nexus-network = { workspace = true, optional = true }
