# build/riscv/Cargo.toml — Configuração para compilação RISC-V (riscv64gc-unknown-linux-gnu)
[package]
name = "arkhe-riscv"
version = "170.0.0"
edition = "2021"

[lib]
crate-type = ["staticlib", "cdylib"]

[features]
default = ["low-power", "crypto-constant-time"]
low-power = []  # Otimizações para dispositivos com <1W
crypto-constant-time = []  # Garantir execução constante para ops criptográficas
noma-accel = ["arkhe-unified/nomad"]  # Incluir NOMA se habilitado

[dependencies]
arkhe-unified = { path = "../..", default-features = false, features = ["std"] }

# Dependências otimizadas para RISC-V
libc = { version = "0.2", default-features = false }
# Crypto libs com implementação constante-time para RISC-V
ring = { version = "0.17", features = ["std"], default-features = false }
# Optional: use riscv-specific crypto if available
# riscv-crypto = { version = "0.1", optional = true }

[profile.release]
opt-level = "z"  # Optimize for size (critical for IoT flash)
lto = true
codegen-units = 1
panic = "abort"
strip = true

# RISC-V specific flags
[target.riscv64gc-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=generic-rv64",
    "-C", "link-arg=-Wl,--gc-sections",  # Remove unused code
    "-C", "link-arg=-Wl,-z,relro,-z,now",  # RELRO para segurança
    "-C", "force-frame-pointers=yes",  # Melhor backtrace para debugging
]

# Low-power optimizations
[profile.release.package."*"]
opt-level = "z"
