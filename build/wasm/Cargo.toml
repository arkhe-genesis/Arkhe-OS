# build/wasm/Cargo.toml — Configuração para compilação WebAssembly
[package]
name = "arkhe-wasm"
version = "168.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]
nomad = []  # NOMA 6G support
quantum = ["arkhe-unified/quantum-hardware"]
cosmic = ["arkhe-unified/cosmic-scale"]

[dependencies]
arkhe-unified = { path = "../..", default-features = false, features = ["std"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = { version = "0.1", optional = true }
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console", "Request", "RequestInit", "Response", "Window"
] }

[profile.release]
opt-level = "s"  # optimize for size
lto = true
