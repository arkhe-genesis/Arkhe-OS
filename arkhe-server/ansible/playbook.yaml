- hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
    - name: Install dependencies
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present
    - name: Install Docker
      apt:
        name: docker-ce
        state: present
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
    - name: Configure MRC Node Profile
      copy:
        dest: /etc/mrc/profile.conf
        content: |
          profile=EV_CC
          probe_interval=5s
      notify: Restart MRC Service
    - name: Create MRC systemd service
      copy:
        dest: /etc/systemd/system/mrc-node.service
        content: |
          [Unit]
          Description=MRC Node Service
          [Service]
          ExecStart=/usr/local/bin/mrc_controller
          Restart=always
          [Install]
          WantedBy=multi-user.target
      notify: Restart MRC Service

  handlers:
    - name: Restart MRC Service
      systemd:
        name: mrc-node
        state: restarted
        daemon_reload: yes
