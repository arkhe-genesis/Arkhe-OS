[package]
name = "cathedral-mcp-client"
version = "1.0.0"
edition = "2021"
description = "Cliente MCP para integração com Plurality Network"
authors = ["Cathedral ARKHE Team <cathedral@arkhe.ai>"]
license = "MIT OR Apache-2.0"

[dependencies]
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1.38", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
url = "2.5"
oauth2 = "4.4"
jsonwebtoken = "9.0"
rand = "0.8"
lru = "0.12"
chrono = { version = "0.4", features = ["serde"] }
backoff = { version = "0.4", features = ["tokio"] }
