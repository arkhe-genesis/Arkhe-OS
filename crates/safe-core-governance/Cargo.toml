[package]
name = "safe-core-governance"
version = "1.0.0"
edition = "2024"
description = "Governança para Agentes Autônomos — Ética, Persistência, Verificação, Auditoria"

[dependencies]
safe-core-ethics = { path = "../safe-core-ethics" }
safe-core-persistence = { path = "../safe-core-persistence" }
safe-core-verifier = { path = "../safe-core-verifier" }
safe-core-audit = { path = "../safe-core-audit" }

# Async
tokio = { version = "1.44", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utils
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
uuid = { version = "1.16", features = ["v4"] }
chrono = "0.4"
hex = "0.4"

[features]
default = []
