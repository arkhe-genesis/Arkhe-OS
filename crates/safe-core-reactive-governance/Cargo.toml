[package]
name = "safe-core-reactive-governance"
version = "0.1.0"
edition = "2024"
authors = ["Arkhe Research Group"]
description = "Reactive governance layer for Dark Bio + AGISAFE: signed governance actions, watchdog, and integration with UED & Sparse-Dense."

[dependencies]
# Workspace internals
#crypto = { path = "../crypto-multi-algo", package = "safe-core-crypto-multi" }
#merkle = { path = "../merkle-tree", package = "safe-core-merkle-tree" }
#hsm = { path = "../hw-yubihsm", package = "safe-core-hw-yubihsm" }  # ou hsm trait genérico

# External
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["clock"] }
tokio = { version = "1.44", features = ["full"] }
prometheus = { version = "0.13", optional = true }   # Para métricas
metrics = "0.23"
async-trait = "0.1"

[dev-dependencies]
tempfile = "3.14"
rand = "0.8"

[features]
default = ["watchdog"]
watchdog = ["dep:prometheus"]
