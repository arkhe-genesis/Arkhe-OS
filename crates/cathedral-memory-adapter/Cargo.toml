[package]
name = "cathedral-memory-adapter"
version = "1.0.0"
edition = "2021"
description = "Adaptador de memória Cathedral ↔ Plurality"

[dependencies]
cathedral-mcp-client = { path = "../cathedral-mcp-client" }
tokio = { version = "1.38", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
lru = "0.12"
chrono = "0.4"
async-trait = "0.1"
