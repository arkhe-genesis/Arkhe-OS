[package]
name = "cathedral-relay-adapter"
version = "2.0.0"
edition = "2021"
rust-version = "1.94"
license = "Apache-2.0"
description = "Relay Vaults integration for Cathedral-OS (yield + cross-chain payments)"

[dependencies]
alloy = { version = "0.6", features = [
    "full",
    "node-bindings",
    "signers",
    "signer-local",
    "provider-http",
    "transport-http",
    "contract",
    "json-abi",
] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"] }
tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
thiserror = "2.0"
tracing = "0.1"
hex = "0.4"
anyhow = "1.0"
blake3 = "1.5"
url = "2.5.8"

[dev-dependencies]
mockito = "1.0"
rand = "0.8"
