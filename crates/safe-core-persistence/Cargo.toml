[package]
name = "safe-core-persistence"
version = "1.0.0"
edition = "2024"
description = "Persistência do Estado de Governança — SQLite + RocksDB"

[dependencies]
safe-core-ethics = { path = "../safe-core-ethics" }
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio-rustls"] }
tokio = { version = "1.44", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
