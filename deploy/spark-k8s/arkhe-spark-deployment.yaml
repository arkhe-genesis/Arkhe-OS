# Deploy distribuído ARKHE + PySpark no Kubernetes
apiVersion: v1
kind: ConfigMap
metadata:
  name: arkhe-spark-config
data:
  spark.conf: |
    spark.sql.execution.arrow.pyspark.enabled=true
    spark.sql.adaptive.enabled=true
    spark.sql.adaptive.coalescePartitions.enabled=true
    spark.executor.memory=16g
    spark.driver.memory=8g
    spark.executor.cores=4
    spark.dynamicAllocation.enabled=true
    spark.dynamicAllocation.minExecutors=2
    spark.dynamicAllocation.maxExecutors=50
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: arkhe-distributed-genomics
  namespace: arkhe
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "arkhe/spark-arkhe:6.8.0"
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/examples/spark_distributed_pipeline.py
  sparkVersion: "3.4.1"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
  driver:
    cores: 4
    memory: 8g
    serviceAccount: arkhe-spark
  executor:
    cores: 4
    memory: 16g
    instances: 10
    serviceAccount: arkhe-spark
  configMaps:
    - name: arkhe-spark-config
      mountPath: /opt/spark/conf/spark.conf
