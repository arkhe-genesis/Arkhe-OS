apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: arkhe-quantum-staging

resources:
- namespace.yaml
- qbus-deployment.yaml
- photon-emitter-deployment.yaml

configMapGenerator:
- name: photon-emitter-config
  files:
  - emitter.yaml=config/emitter-staging.yaml

secretGenerator:
- name: arkhe-quantum-tls
  files:
  - ca.crt=certs/staging/ca.crt
  - server.crt=certs/staging/server.crt
  - server.key=certs/staging/server.key
  type: kubernetes.io/tls

- name: arkhe-hsm-configuration
  literals:
  - hsm_provider=aws_cloudhsm
  - key_label=arkhe-pqc-staging

replacements:
- source:
    kind: ConfigMap
    name: photon-emitter-config
    fieldPath: data.emitter.yaml
  targets:
  - select:
      kind: Deployment
      name: arkhe-photon-emitter
    fieldPaths:
    - spec.template.spec.containers.[name=photon-emitter].env.[name=EMITTER_CONFIG].value
