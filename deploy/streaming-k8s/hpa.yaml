apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arkhe-streaming-hpa
  namespace: arkhe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arkhe-streaming
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
