# ───────────────────────────────────────────────────────────────────────────────
# Substrate ExtendDB — DynamoDB-compatible adapter
# ───────────────────────────────────────────────────────────────────────────────
extenddb:
  enabled: true
  name: extenddb
  version: "v0.1.0"

  image:
    repository: ghcr.io/arkhe-os/extenddb
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # PostgreSQL backend (obrigatório)
  storage:
    postgres:
      host: ""          # preenchido via Terraform ou values-production.yaml
      port: 5432
      user: arkhe_extenddb
      database: extenddb_catalog
      existingSecret: extenddb-postgres-credentials

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: ["ALL"]

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
      scheme: HTTPS
    initialDelaySeconds: 15
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
      scheme: HTTPS
    initialDelaySeconds: 5
    periodSeconds: 15

  # Persistência para certificados TLS
  persistence:
    enabled: true
    size: 1Gi
    mountPath: /root/.extenddb

  ingress:
    enabled: false   # Expor via gateway principal

  # Prometheus metrics
  monitoring:
    enabled: true
    metricsPort: 8000
    metricsPath: /metrics

# ───────────────────────────────────────────────────────────────────────────────
# Substrate 597A — OpenBioLLM (Ollama Sidecar)
# ───────────────────────────────────────────────────────────────────────────────
substrate597a:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/openbiollm
    tag: "latest"
  sidecarOllama:
    enabled: true
    image: ollama/ollama:latest
    port: 11434
    resources:
      limits:
        cpu: 2000m
        memory: 8Gi

# ───────────────────────────────────────────────────────────────────────────────
# Substrate 597B — BioLLM-BGI (scGPT/Geneformer with GPU)
# ───────────────────────────────────────────────────────────────────────────────
substrate597b:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/biollm-bgi
    tag: "latest"
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 32Gi

# ───────────────────────────────────────────────────────────────────────────────
# Substrate 597C — BioLLM-Wetware
# ───────────────────────────────────────────────────────────────────────────────
substrate597c:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/biollm-wetware
    tag: "latest"
  cl1_interface_url: "http://biollm-wetware.internal:5000"

# ───────────────────────────────────────────────────────────────────────────────
# Substrate 595 — IRIS-ALPHA v3.0 Live-Coder
# ───────────────────────────────────────────────────────────────────────────────
substrate595:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/live-coder
    tag: "latest"
  sidecarIris:
    enabled: true
    image: ghcr.io/arkhe-os/iris-alpha:latest
    port: 8080
    resources:
      limits:
        nvidia.com/gpu: 1
