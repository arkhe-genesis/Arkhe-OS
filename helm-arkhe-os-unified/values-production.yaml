# ═══════════════════════════════════════════════════════════════════════════════
# ARKHE OS Unified — Production Overrides
# ═══════════════════════════════════════════════════════════════════════════════

# Override global
imageRegistry: "ghcr.io/arkhe-os"

# Substrate 585 — Groth16 ZK Security (3 replicas, alta disponibilidade)
substrate585:
  replicaCount: 3
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  persistence:
    size: 50Gi

# Substrate 586 — Synapse Brain Map (3 replicas, GPU required)
substrate586:
  replicaCount: 3
  resources:
    limits:
      cpu: 16000m
      memory: 64Gi
      nvidia.com/gpu: 2
    requests:
      cpu: 4000m
      memory: 16Gi
  persistence:
    size: 2Ti
    storageClass: "premium-rwo"

# Substrate 587 — Podman Runtime (2 replicas)
substrate587:
  replicaCount: 2
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 2Gi

# Substrate 566 — Container Runtime (2 replicas)
substrate566:
  replicaCount: 2
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

# Substrate 570 — Claude Code Bridge (1 replica, stateful)
substrate570:
  replicaCount: 1
  resources:
    limits:
      cpu: 8000m
      memory: 32Gi
    requests:
      cpu: 2000m
      memory: 8Gi
  persistence:
    size: 500Gi

# Autoscaling agressivo
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Gateway com TLS
gateway:
  replicaCount: 3
  ingress:
    enabled: true
    tls:
      - secretName: arkhe-unified-tls-prod
        hosts:
          - arkhe.prod.arkhe-os.org

# PDB mais restritivo
podDisruptionBudget:
  enabled: true
  minAvailable: 2
