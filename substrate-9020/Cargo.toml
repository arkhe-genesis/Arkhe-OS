[package]
name = "arkhe-daybreak"
version = "6.1.0"
edition = "2021"

[dependencies]
arkhe-compliance = { path = "../substrate-6090" }
arkhe-multiversal-compliance = { path = "../substrate-6091" }
arkhe-zklib = { path = "../substrate-6080" }
arkhe-temporal = { path = "../substrate-6064/temporal" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"
petgraph = "0.6"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
hmac = "0.12"
async-trait = "0.1"

[features]
default = ["full"]
full = ["arkhe-zklib/plonky2"]
