[package]
name = "arkhe-qip"
version = "5.7.0"
edition = "2021"
description = "ARKHE Ω-TEMP — Substrato 6071: Quantum Intellectual Property (QIP) com ORCID"
license = "MIT"
repository = "https://github.com/arkhe-os/substrate-6071"
readme = "../README.md"
keywords = ["arkhe", "intellectual-property", "provenance", "zk-proof", "shapley", "influence", "orcid"]
categories = ["cryptography", "machine-learning", "data-structures", "science"]


[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 3
lto = "fat"
strip = true
codegen-units = 1
panic = "abort"
incremental = false

[profile.dev]
opt-level = 0
debug = true
overflow-checks = true

[profile.bench]
opt-level = 3
lto = true
debug = false

[features]
default = ["full-zk", "orbital-oracle", "x402-payments"]
full-zk = []
mini-zk = []
orbital-oracle = []
x402-payments = ["dep:reqwest"]
sim-test = []

[dependencies]
# === ARKHE Ecosystem ===
#arkhe-core = { path = "../../arkhe-core", optional = true }
#arkhe-temporal = { path = "../../arkhe-temporal", optional = true }
#arkhe-consensus = { path = "../../arkhe-consensus", optional = true }
#arkhe-polyglot = { path = "../../arkhe-polyglot-parser", optional = true }
#arkhe-continental = { path = "../substrate-6064", optional = true }

# === ORCID Subcrate ===
arkhe-orcid = { path = "../orcid" }

# === Parallelism ===
rayon = "1.10"
crossbeam = "0.8.4"

# === Cryptography ===
sha3 = "0.10.8"
blake3 = "1.7.1"
ed25519 = "2.2.3"
hmac = "0.12.1"
aes = "0.8.4"
curve25519-dalek = { version = "4.1.3", features = ["serde"] }
rand_chacha = "0.3.1"
rand_core = "0.6.4"

# === ZK & Proofs ===
ark-bn254 = { version = "0.4.0", optional = true }
ark-ec = { version = "0.4.0", optional = true }
ark-ff = { version = "0.4.0", optional = true }
ark-poly = { version = "0.4.0", optional = true }
ark-std = { version = "0.4.0", optional = true }
bellman = { version = "0.14.0", optional = true }
merlin = { version = "3.0.0", optional = true }
bulletproofs = { version = "4.0.0", optional = true }

# === Serialization ===
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
bincode = "1.3.3"
postcard = "1.0.11"
rmp-serde = "1.3.0"

# === ML / Numerical ===
half = "2.4"
ndarray = { version = "0.15.6", optional = true }
num-traits = "0.2.18"
statrs = "0.16.1"

# === Communication ===
reqwest = { version = "0.12.0", features = ["rustls-tls"], optional = true }
tonic = { version = "0.12.0", optional = true }
prost = "0.12.6"

# === Hashing & Trees ===
petgraph = "0.6.4"
ordered-float = "4.4.0"
hashbrown = "0.14.5"
ahash = "0.8.11"

# === Utilities ===
indicatif = "0.17.8"
uuid = { version = "1.8.0", features = ["v4", "serde"] }
chrono = { version = "0.4.38", features = ["serde"] }
itertools = "0.13.0"
hex = "0.4.3"
base64 = "0.22.1"
thiserror = "1.0.61"
anyhow = "1.0.81"
once_cell = "1.19.0"
smallvec = "1.13.2"
bitflags = "2.6.0"
tracing = "0.1.40"
log = "0.4.22"

# === HTTP Client ===
ureq = { version = "2.9", optional = true }

[build-dependencies]
cbindgen = { version = "0.26.0", optional = true }

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }
insta = "1.34.0"
pretty_assertions = "1.4.0"
arbitrary = { version = "1.3.2", features = ["derive"] }
proptest = "1.4.0"
rstest = "0.18.2"
tempfile = "3.10.1"
tokio = { version = "1.38", features = ["full", "test-util", "sync"] }

[[bench]]
name = "shapley_bench"
harness = false

[[bench]]
name = "zk_proof_bench"
harness = false

[[bench]]
name = "influence_bench"
harness = false

[[bench]]
name = "market_auction_bench"
harness = false
