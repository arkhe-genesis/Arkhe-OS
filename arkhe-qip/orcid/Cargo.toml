[package]
name = "arkhe-orcid"
version = "5.7.0"
edition = "2021"
description = "ARKHE Ω-TEMP — ORCID Integration para Quantum Intellectual Property"
license = "MIT"
repository = "https://github.com/arkhe-os/substrate-6071"
keywords = ["arkhe", "orcid", "researcher-identity", "oauth", "intellectual-property"]
categories = ["authentication", "api-bindings", "science"]

[dependencies]
rand = "0.8"
urlencoding = "2.1"
hex = "0.4"
hmac = "0.12"
uuid = { version = "1.8", features = ["v4"] }

# === HTTP & OAuth ===
reqwest = { version = "0.12.0", features = ["rustls-tls", "json"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
serde_urlencoded = "0.7.1"
base64 = "0.22.1"
jsonwebtoken = "9.3"
ring = "0.17"

# === Cryptography ===
sha2 = "0.10.8"
sha3 = "0.10.8"
ed25519 = "2.2.3"
p256 = { version = "0.13.2", features = ["ecdsa"] }

# === Time ===
chrono = { version = "0.4.38", features = ["serde"] }
tokio = { version = "1.38", features = ["full", "sync", "time"] }

# === Logging ===
tracing = "0.1.40"

[dev-dependencies]
mockito = "1.2"
wiremock = "0.6"
urlencoding = "2.1.3"
rand = "0.8.5"
hex = "0.4.3"
