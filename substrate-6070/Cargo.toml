[package]
name = "arkhe-entropy-oracle"
version = "6.1.0"
edition = "2021"
authors = ["ARKHE OS <hello@arkhe.os>"]
description = "Substrato 6070: Entropy Oracle for ARKHE TemporalChain"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
sha3 = "0.10"
ark-bn254 = "0.4"
ark-groth16 = "0.4"
ark-snark = "0.4"
ark-std = "0.4"

# Plonky2 dependency as per memory
plonky2 = { git = "https://github.com/mir-protocol/plonky2" }
anyhow = "1.0"

# Plonky2 required dependencies for EntropyRangeCircuit
plonky2_field = { git = "https://github.com/mir-protocol/plonky2", version = "1.0.0" }

nexus-core = { workspace = true, optional = true }
nexus-network = { workspace = true, optional = true }
