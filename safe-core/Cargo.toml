[workspace]
resolver = "2"
members = [
    "crates/cognitive-core",
    "crates/action-executor",
    "crates/memory-system",
    "crates/kernel",
]

[workspace.dependencies]
# Async runtime
tokio = { version = "1.43", features = ["full", "process", "rt-multi-thread"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha2 = "0.10"
blake3 = "1.6"
hex = "0.4"

# ML / Inference (UPDATED to latest verified versions)
candle-core = "0.11"
candle-transformers = "0.11"
candle-nn = "0.11"
hf-hub = "0.4"
tokenizers = "0.23"

# Banco Vetorial (UPDATED to latest verified version)
qdrant-client = "1.18"

# Merkle Tree (UPDATED to latest verified version)
rs_merkle = "1.5"

# heartbit-core (agentic framework)
heartbit-core = "2026.613.1"

# Utilitários
thiserror = "2.0"
chrono = { version = "0.4", features = ["clock"] }
uuid = { version = "1.10", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = "0.3"
async-trait = "0.1"
shlex = "1.3"
url = "2.5"
anyhow = "1.0"

# HTTP
reqwest = { version = "0.12", features = ["json"] }

# Linux APIs
nix = { version = "0.29", features = ["process", "signal"] }
libc = "0.2"

# Landlock (UPDATED to latest verified version)
landlock = "0.4"

[profile.release]
opt-level = 3
lto = true
