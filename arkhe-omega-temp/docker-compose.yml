version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: arkhe
      POSTGRES_PASSWORD: arkhe
      POSTGRES_DB: arkhe
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [redis, postgres, ollama]
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_ENDPOINT=http://ollama:11434

  node-alfa:
    build: .
    command: python3 run.py --node ALFA-01
    depends_on: [api]

  node-beta:
    build: .
    command: python3 run.py --node BETA-02
    environment:
      - AI_ENABLED=true
    depends_on: [api]

  node-gamma:
    build: .
    command: python3 run.py --node GAMMA-03
    depends_on: [api]

volumes:
  redis_data:
  pgdata:
  ollama_data:
