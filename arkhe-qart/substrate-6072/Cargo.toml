[package]
name = "arkhe-qart"
version = "6.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 3
lto = "fat"
strip = true
codegen-units = 1
panic = "abort"
incremental = false

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
sha3 = "0.10.8"
blake3 = "1.7.1"
thiserror = "1.0.61"
tracing = "0.1.40"
log = "0.4.22"
chrono = { version = "0.4.38", features = ["serde"] }
hex = "0.4.3"
image = { version = "0.25", optional = true }

# Plonky2 para ZK proofs
plonky2 = { git = "https://github.com/mir-protocol/plonky2", optional = true }

# tch-rs (Torch bindings) para CLIP
tch = { version = "0.14.0", optional = true }

# ndarray para manipulação de tensores
ndarray = { version = "0.15.6", optional = true }

# reqwest para comunicação com bridge Go
reqwest = { version = "0.12.0", features = ["rustls-tls"], optional = true, default-features = false }
tokio = { version = "1.38", features = ["full", "sync"], optional = true }

# Curves para Plonky2
curve25519-dalek = { version = "4.1.3", features = ["serde"] }

uuid = { version = "1.8", features = ["v4"] }
tiny_http = "0.12"
hmac = "0.12"
sha2 = "0.10"

[features]
default = ["full-zk", "x402-payments"]
full-zk = ["dep:plonky2"]
style-models = ["dep:tch", "dep:ndarray", "dep:image"]
x402-payments = ["dep:reqwest", "dep:tokio"]
sim-test = []

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }
pretty_assertions = "1.4.0"
proptest = "1.4.0"
tempfile = "3.10.1"

[[bench]]
name = "influence_bench"
harness = false

[[bench]]
name = "zk_proof_bench"
harness = false

[[bench]]
name = "fingerprint_bench"
harness = false
