[package]
name = "arkhe-qart"
version = "5.8.0"
edition = "2021"
description = "ARKHE Ω-TEMP — Substrato 6072: Q-Art (Quantum Artistic Influence)"
license = "MIT"
repository = "https://github.com/arkhe-os/substrate-6072"
readme = "../README.md"
keywords = ["arkhe", "art", "intellectual-property", "zk-proof", "style-embedding", "royalties", "perceptual-hash", "nft"]
categories = ["cryptography", "machine-learning", "multimedia", "blockchain"]

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 3
lto = "fat"
strip = true
codegen-units = 1
panic = "abort"
incremental = false

[profile.dev]
opt-level = 0
debug = true
overflow-checks = true

[profile.bench]
opt-level = 3
lto = true
debug = false

[features]
default = ["full-zk", "orbital-oracle", "x402-payments", "style-models"]
full-zk = []
mini-zk = []
orbital-oracle = []
x402-payments = ["dep:reqwest"]
style-models = []
sim-test = []

[dependencies]
# === ARKHE Ecosystem ===
# arkhe-core = { path = "../../arkhe-core", optional = true }
# arkhe-temporal = { path = "../../arkhe-temporal", optional = true }
# arkhe-qip = { path = "../../arkhe-qip/substrate-6071", optional = true }
# arkhe-polyglot = { path = "../../arkhe-polyglot-parser", optional = true }

# === Parallelism ===
rayon = "1.10"
crossbeam = "0.8.4"

# === Cryptography ===
sha3 = "0.10.8"
blake3 = "1.7.1"
ed25519 = { version = "2.2.3" }
hmac = "0.12.1"
curve25519-dalek = { version = "4.1.3", features = ["serde"] }
rand_chacha = "0.3.1"
rand_core = "0.6.4"
bellman = { version = "0.14.0", optional = true }
ark-bn254 = { version = "0.4.0", optional = true }
ark-ec = { version = "0.4.0", optional = true }
ark-ff = { version = "0.4.0", optional = true }
ark-poly = { version = "0.4.0", optional = true }
ark-std = { version = "0.4.0", optional = true }
merlin = { version = "3.0.0", optional = true }
# plonky2 = { version = "0.70.0", optional = true }
bulletproofs = { version = "4.0.0", optional = true }
# pedersen = { version = "0.3.0", optional = true }

# === Serialization ===
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
bincode = "1.3.3"
postcard = "1.0.11"
rmp-serde = "1.3.0"

# === ML / Numerical ===
half = "2.4"
ndarray = { version = "0.15.6", optional = true }
num-traits = "0.2.18"
statrs = "0.16.1"
tch = { version = "0.14.0", optional = true } # PyTorch bindings
candle-core = { version = "0.3.0", optional = true }
linfa = { version = "0.7.0", optional = true }

# === Image/Audio Processing ===
image = { version = "0.25.0", optional = true }
hound = { version = "3.5.0", optional = true } # WAV reading
rustfft = "6.0.0"

# === Communication ===
reqwest = { version = "0.12.0", features = ["rustls-tls"], optional = true }
tonic = { version = "0.12.0", optional = true }
prost = "0.12.6"

# === Hashing & Trees ===
petgraph = "0.6.4"
ordered-float = "4.4.0"
hashbrown = "0.14.5"
