platform:
  type: auto  # Detecção automática via IMDS/metadata/env

  common:
    replicas: 3
    image:
      repository: ghcr.io/arkhe-os/cert-operator
      tag: v421.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  azure:
    enabled: true
    region: eastus
    keyVaultName: arkhe-kv
    useManagedIdentity: true

  gcp:
    enabled: true
    region: us-central1
    projectId: arkhe-staging
    useWorkloadIdentity: true

  oracle:
    enabled: false
    region: us-ashburn-1
    compartmentId: ocid1.compartment.oc1...
