[package]
name = "arkhe-mcp-bridge"
version = "6.1.0"
edition = "2021"
description = "Ark-lang MCP Bridge - Universal Connector for AI Tools"

[lib]
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.38", features = ["full"] }

[features]
default = []
