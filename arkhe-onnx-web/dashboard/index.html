<!-- dashboard/index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARKHE Dashboard · Crystal Brain ONNX</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: monospace; background: #0a0a1a; color: #e0e0ff; padding: 20px; }
    .panel { background: #1a1a3a; border-radius: 8px; padding: 16px; margin: 12px 0; }
    canvas { max-width: 100%; }
    .metric { display: inline-block; margin: 4px 12px; }
    .value { color: #7df; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🔮 ARKHE Dashboard · Crystal Brain ONNX</h1>

  <div class="panel">
    <h3>📦 Carregar Modelo ONNX</h3>
    <input type="file" id="modelInput" accept=".onnx" />
    <button onclick="loadModel()">Carregar</button>
    <span id="modelStatus">Nenhum modelo carregado</span>
  </div>

  <div class="panel">
    <h3>⚙️ Parâmetros de Inferência</h3>
    <label>Batch size: <input type="number" id="batchSize" value="1" min="1" max="16"/></label>
    <label>κ (acoplamento): <input type="range" id="kappa" min="0.1" max="2.0" step="0.01" value="0.84"/></label>
    <span class="value" id="kappaValue">0.84</span>
    <button onclick="runInference()">▶ Executar Inferência</button>
  </div>

  <div class="panel">
    <h3>📊 Métricas em Tempo Real</h3>
    <span class="metric">CAPTURE: <span class="value" id="captureMetric">—</span></span>
    <span class="metric">Coerência ρ: <span class="value" id="coherenceMetric">—</span></span>
    <span class="metric">Latência: <span class="value" id="latencyMetric">—</span>ms</span>
  </div>

  <div class="panel">
    <h3>🎨 Visualização do Manifold</h3>
    <canvas id="manifoldChart" width="800" height="400"></canvas>
  </div>

  <div class="panel">
    <h3>🧬 Código Latente (sparse)</h3>
    <pre id="latentCode" style="max-height: 200px; overflow: auto;"></pre>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
