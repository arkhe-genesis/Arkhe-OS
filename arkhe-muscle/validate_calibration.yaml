# validate_calibration.yaml — Validação cruzada e selo final

validation_protocol:
  name: "Validação Cruzada Invariante"
  version: "1.0"

  steps:
    - name: "Consistência Fase-Força"
      threshold: 1e-8 # 10 nN
      seal_required: true

    - name: "Reprodutibilidade Temporal"
      interval: 86400 # 24h
      seal_required: true

    - name: "Consistência entre Sensores"
      threshold: 1e-6 # 1 ppm
      seal_required: true
