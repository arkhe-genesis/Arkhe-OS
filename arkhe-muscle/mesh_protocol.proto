syntax = "proto3";

package arkhe.mesh.v1;

message PhaseSyncRequest {
  string body_id = 1;
  uint64 clepsydra_cycle = 2;
  bytes atomic_timestamp = 3;
}

message PhaseSyncResponse {
  string responder_id = 4;
  bool sync_ok = 5;
}

service MeshSynchronization {
  rpc SyncPhase(PhaseSyncRequest) returns (PhaseSyncResponse);
}
