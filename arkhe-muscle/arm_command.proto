syntax = "proto3";

package arkhe.arm.v1;

message MoveToPose {
  repeated double position = 1;
  repeated double orientation = 2;
  double max_speed = 3;
}

message ArmState {
  repeated double joint_positions = 1;
  double invariance_metric = 2;
}

service ArmControl {
  rpc MoveToPose(MoveToPose) returns (Ack);
  rpc StreamState(Empty) returns (stream ArmState);
}

message Ack { bool success = 1; }
message Empty {}
