// Política de privacidade para Fase 1 (MVP)
version: "0.1.0"
effective_date: "2026-05-08"

data_minimization:
  - "Apenas eventos explicitamente habilitados em settings.json são capturados"
  - "Snippets de código são redatados por padrão (padrões: senhas, tokens, chaves)"
  - "Paths de arquivo são hasheados com SHA-256 truncado (16 hex chars)"
  - "Retenção local de buffer: máximo 50 eventos ou 30 segundos"

user_control:
  - "Opt-out granular por tipo de evento via array `arkhe.ide_parser.events`"
  - "Exportação manual de sessão requer confirmação explícita via UI"
  - "Configuração `arkhe.ide_parser.enabled: false` desabilita toda captura"

encryption:
  - "Eventos em trânsito: TLS 1.3 obrigatório para endpoints `wss://` ou `https://`"
  - "Metadados sensíveis: criptografia no lado do cliente antes do envio (futuro)"

transparency:
  - "Log local em `~/.arkhe/logs/ide_parser.log` com todos os eventos enviados"
  - "Comando `ARKHE: Ver Log de Privacidade` exibe resumo anonimizado"
  - "Relatório de conformidade gerado automaticamente a cada exportação"

compliance:
  - "Conforme LGPD/GDPR: dados anonimizados, sem PII identificável"
  - "Direito ao esquecimento: comando `ARKHE: Limpar Dados Locais` remove buffers"
