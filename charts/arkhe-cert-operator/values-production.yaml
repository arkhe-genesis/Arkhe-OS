# Production values for Arkhe Certificate Operator
replicaCount: 3

certManager:
  issuerName: "arkhe-internal-issuer"

prometheus:
  serviceMonitor:
    enabled: true

# Backup annotations for Velero
podAnnotations:
  backup.velero.io/backup-volumes: "operator-data"

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - arkhe-cert-operator
      topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 2
