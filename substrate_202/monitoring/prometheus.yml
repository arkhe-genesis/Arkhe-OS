global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'arkhe-phi-bus'
    static_configs:
      - targets: ['phi-bus:8081']
    metrics_path: '/metrics'

  - job_name: 'arkhe-cobol-parser'
    static_configs:
      - targets: ['cobol-parser:8080']
    metrics_path: '/metrics'

  - job_name: 'arkhe-verifier-loop'
    static_configs:
      - targets: ['verifier-loop:8083']
    metrics_path: '/metrics'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']