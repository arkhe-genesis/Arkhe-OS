version: '3.8'
services:
  arkhe-node:
    build:
      context: .
      dockerfile: docker/Dockerfile.linux
    volumes:
      - arkhe_data:/data
      - ./config:/etc/arkhe:ro
    ports:
      - "8080:8080"   # API Gateway
      - "9090:9090"   # Metrics
      - "9500:9500"   # Debug
    environment:
      - ARKHE_NODE_NAME=windows-node-01
      - ARKHE_CONSENSUS_THRESHOLD=0.85
      - ARKHE_SOLAR_FEED=true
      - ARKHE_ZK_PROOFS=true
    restart: unless-stopped
    networks:
      - arkhe-net

  arkhe-monitor:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-arkhe_default}
    depends_on:
      - arkhe-node
    networks:
      - arkhe-net

volumes:
  arkhe_data:
  grafana_data:

networks:
  arkhe-net:
    driver: bridge
