version: '3.8'

services:
  cathedrald-core:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - cathedral-net
    environment:
      - PYTHONPATH=/app

  quantum-bus:
    build: .
    command: python3 scripts/quantum_bus.py
    networks:
      - cathedral-net

  gateway:
    build: .
    command: python3 scripts/gateway_bridge.py --port 8080
    ports:
      - "8080:8080"
    networks:
      - cathedral-net
    depends_on:
      - quantum-bus

  entropy-monitor:
    build: .
    command: python3 scripts/entropy_monitor.py
    networks:
      - cathedral-net
    depends_on:
      - gateway

  sapphire-node:
    build: .
    command: python3 scripts/global_handshake.py --server
    networks:
      - cathedral-net

  diamond-node:
    build: .
    command: python3 scripts/global_handshake.py
    networks:
      - cathedral-net
    depends_on:
      - sapphire-node

networks:
  cathedral-net:
    driver: bridge
