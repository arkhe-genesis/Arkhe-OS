# docker-compose.yml
# Orquestração completa da Catedral Arkhe(N)
# Uso: docker-compose up -d

version: '3.8'

services:
  # ============================================
  # Núcleo da Catedral (Meta-Controlador + DBus)
  # ============================================
  cathedrald-core:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cathedrald-core
    volumes:
      - ./data/codex:/var/lib/cathedral/codex
      - ./data/seeds:/var/lib/cathedral/seeds
    environment:
      - CATHEDRAL_ROLE=master
      - CATHEDRAL_NAME=ArkheN-Core
    networks:
      - cathedral-net
    restart: unless-stopped
    command: python3 catedrald_part2.py daemon

  # ============================================
  # Barramento quantum:// (Simulado via Redis/PubSub para este exemplo)
  # ============================================
  quantum-bus:
    image: redis:alpine
    container_name: quantum-bus
    networks:
      - cathedral-net
    restart: unless-stopped

  # ============================================
  # Gateway REST → quantum://
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - CATHEDRAL_ORACLE_MODE=true
    networks:
      - cathedral-net
    restart: unless-stopped
    command: python3 presence_field_server.py

  # ============================================
  # Nó Safira (Simulação de Hardware Óptico)
  # ============================================
  sapphire-node:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: sapphire-node
    networks:
      - cathedral-net
    restart: unless-stopped
    command: python3 catedrald_safira.py --info

  # ============================================
  # Nó Diamante (Simulação de Centro NV)
  # ============================================
  diamond-node:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: diamond-node
    depends_on:
      - sapphire-node
    networks:
      - cathedral-net
    restart: unless-stopped
    command: python3 catedrald_diamante.py

  # ============================================
  # IPFS Node (Distribuição da Merkle Root)
  # ============================================
  ipfs-node:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    volumes:
      - ./data/ipfs:/data/ipfs
    environment:
      - IPFS_PATH=/data/ipfs
    networks:
      - cathedral-net
    restart: unless-stopped

  # ============================================
  # Dashboard ASCII (Vitral)
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: dashboard
    tty: true
    stdin_open: true
    networks:
      - cathedral-net
    restart: unless-stopped
    command: python3 catedrald_part2.py --standalone dashboard

networks:
  cathedral-net:
    driver: bridge
