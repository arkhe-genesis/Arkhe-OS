run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - contextcheck
    - errname
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  gofmt:
    simplify: true
  govet:
    check-shadowing: true
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
  exclude-use-default: false

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true