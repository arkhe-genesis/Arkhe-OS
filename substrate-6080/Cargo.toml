[package]
name = "arkhe-zklib"
version = "6.1.0"
edition = "2021"
description = "ARKHE Zero-Knowledge Cryptography Library"
license = "MIT"
repository = "https://github.com/arkhe-os/arkhe-zklib"
keywords = ["zk", "zero-knowledge", "arkhe", "plonky2", "groth16"]
categories = ["cryptography", "no-std"]

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 3
lto = "fat"
strip = true
codegen-units = 1
panic = "abort"
incremental = false

[features]
default = ["plonky2"]
plonky2 = ["dep:plonky2", "dep:plonky2_field"]
groth16 = ["dep:ark-bls12-381", "dep:ark-groth16", "dep:ark-serialize", "dep:ark-std"]
full = ["plonky2", "groth16"]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen"]

[dependencies]
# === Core ===
serde = { version = "1.0", features = ["derive"], default-features = false }
bincode = "1.3"
postcard = { version = "1.0", default-features = false }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
sha3 = { version = "0.10", default-features = false }
thiserror = "1.0"
tracing = { version = "0.1", optional = true }
once_cell = "1.19"
rand = { version = "0.8", default-features = false }
rand_core = { version = "0.6", default-features = false }

# === Plonky2 (opcional) ===
plonky2 = { git = "https://github.com/mir-protocol/plonky2", optional = true }
plonky2_field = { git = "https://github.com/mir-protocol/plonky2", optional = true }

# === Groth16 / Arkworks (opcional) ===
ark-bls12-381 = { version = "0.4", optional = true, default-features = false }
ark-groth16 = { version = "0.4", optional = true, default-features = false }
ark-serialize = { version = "0.4", optional = true, default-features = false }
ark-std = { version = "0.4", optional = true, default-features = false }

# === Wasm ===
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }

# === Utilities ===
petgraph = { version = "0.6", optional = true }
rayon = { version = "1.10", optional = true }
blake3 = { version = "1.7", optional = true }
hmac = { version = "0.12", optional = true }

nexus-sdk = { workspace = true, optional = true }
nexus-core = { workspace = true, optional = true }
nexus-network = { workspace = true, optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
proptest = "1.4"
