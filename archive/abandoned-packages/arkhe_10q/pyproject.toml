[tool.poetry]
name = "arkhe-10q"
version = "0.1.0"
description = "ARKHE Operating System 10Q — Hyper-Mesh de Coerência em Escala de Dezena de Quatrilhões"
authors = ["ARKHE Sovereign Collective <sovereign@arkhe.os>"]
license = "ARKHE-SOVEREIGN"
readme = "README.md"
packages = [{include = "arkhe_10q"}]

[tool.poetry.dependencies]
python = "^3.10"
torch = ">=2.1.0"
numpy = "^1.24.0"
scipy = "^1.11.0"
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
torch-xla = {version = ">=2.1.0", optional = true}
coq = {version = "^8.17.0", optional = true}

[tool.poetry.extras]
tpu = ["torch-xla"]
proof = ["coq"]

[tool.poetry.group.dev.dependencies]
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.5.0"
pre-commit = "^3.4.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
