name: ARKHE ASI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        platform: [linux-x86_64, linux-arm64, windows-x86_64, freebsd-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-pip rustc cargo
      - name: Build
        run: make ${{ matrix.platform }}
      - name: Unit Tests
        run: make test-unit
      - name: Integration Tests
        run: make test-integration
      - name: Performance Tests
        run: make test-performance
      - name: Security Scan
        run: make test-security
      - name: Package
        if: github.ref == 'refs/heads/main'
        run: make package

  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Docker Images
        run: make docker