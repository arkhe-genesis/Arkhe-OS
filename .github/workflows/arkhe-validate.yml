name: ARKHE Constitutional Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  constitutional-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install libcst

      - name: Constitutional Compliance Check
        run: |
          python3 substrate_254/linter/constitutional_linter.py ./src \
            --output lint-report.json \
            --temporal-anchor
