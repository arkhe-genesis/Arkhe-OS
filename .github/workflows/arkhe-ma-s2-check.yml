# GitHub Action para verificação contínua de conformidade MA‑S2
name: ARKHE MA‑S2 Compliance Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Escaneamento diário automático
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Escopo de verificação'
        required: true
        default: 'full'
        type: choice
        options: [full, cvs, apm, inv, aro]

jobs:
  ma-s2-compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Arkhe Runtime
      run: |
        pip install arkp-core arkp-security arkp-inventory arkp-orchestration
        arkp config set temporal-chain-endpoint ${{ secrets.TEMPORAL_CHAIN_ENDPOINT }}

    - name: Generate SBOM (INV‑2.1)
      run: |
        arkp sbom generate \
          --format cyclonedx \
          --output sbom.json \
          --release ${{ github.sha }}
        arkp temporal anchor \
          --event-type "sbom_generated" \
          --artifact sbom.json

    - name: Continuous Vulnerability Scan (CVS‑0.1 to 0.5)
      run: |
        arkp security scan \
          --artifact ${{ github.sha }} \
          --enrich-epss-kev \
          --output scan-results.json \
          --sla-threshold 24h
        # Upload findings para GitHub Security tab
        jq '.findings | map({
          rule_id: .cve,
          level: (if .is_critical then "error" elif .cvss_score >= 7 then "warning" else "note" end),
          locations: [{physicalLocation: {artifactLocation: {uri: "sbom.json"}}}],
          message: {text: .description}
        })' scan-results.json > sarif.json
        gh api /repos/${{ github.repository }}/code-scanning/sarifs \
          -f commit_sha=${{ github.sha }} \
          -f ref=refs/heads/${{ github.head_ref || github.ref_name }} \
          -f sarif=@sarif.json

    - name: Attack Path Modeling (APM‑1.1 to 1.4)
      run: |
        arkp security model-paths \
          --service-map config/services.yaml \
          --threat-context config/threats.json \
          --output attack-paths.json \
          --map-to-mitre
        # Alertar se caminhos de alto risco detectados
        jq -r '.paths[] | select(.priority_score > 0.8) | "⚠️ High-risk path: \(.id) (score: \(.priority_score))"' attack-paths.json | while read alert; do
          echo "$alert"
          # Enviar notificação proativa
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-type: application/json' \
            -d "{\"text\": \"$alert\"}"
        done

    - name: Compliance Assessment (Full MA‑S2)
      id: assessment
      run: |
        REPORT=$(arkp compliance assess \
          --scope ${{ github.event.inputs.scope || 'full' }} \
          --release ${{ github.sha }} \
          --format json)
        echo "report=$REPORT" >> $GITHUB_OUTPUT

        # Falhar job se não conforme
        STATUS=$(echo "$REPORT" | jq -r '.overall_status')
        if [ "$STATUS" != "compliant" ]; then
          echo "❌ Conformidade MA‑S2 não atingida: $STATUS"
          exit 1
        fi

    - name: Generate Compliance Report
      if: always()
      run: |
        arkp compliance report \
          --assessment-id ${{ steps.assessment.outputs.report }} \
          --format markdown \
          --output MA_S2_Compliance_Report.md

        # Upload como artifact
        upload-artifact:
          uses: actions/upload-artifact@v4
          with:
            name: ma-s2-compliance-report
            path: MA_S2_Compliance_Report.md

    - name: Post Results to Dashboard
      if: always()
      run: |
        # Enviar métricas para dashboard executivo em tempo real
        curl -X POST ${{ secrets.DASHBOARD_API_ENDPOINT }}/metrics \
          -H "Authorization: Bearer ${{ secrets.DASHBOARD_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d @- <<EOF
        {
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "repository": "${{ github.repository }}",
          "commit": "${{ github.sha }}",
          "compliance_status": "${{ fromJson(steps.assessment.outputs.report).overall_status }}",
          "domains": ${{ fromJson(steps.assessment.outputs.report).domain_results }},
          "temporal_seal": "${{ fromJson(steps.assessment.outputs.report).temporal_seal }}"
        }
        EOF
