name: ASCII Report Automation

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  generate_report:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow opencv-python fastapi httpx

    - name: Run ASCII Report Generator
      run: |
        python -c "from arkhe_visual.ascii_report_automation import ASCIIReportAutomation; print(ASCIIReportAutomation().generate_daily_report())"
