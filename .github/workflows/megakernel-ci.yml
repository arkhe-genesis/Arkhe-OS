name: MegaKernel Docker CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'substrates/400-499_advanced/substrato_447_megakernel/megakernel/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true # For simulation purposes

      - name: Build and push MegaKernel Docker image
        uses: docker/build-push-action@v5
        with:
          context: substrates/400-499_advanced/substrato_447_megakernel/megakernel
          file: substrates/400-499_advanced/substrato_447_megakernel/megakernel/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: arkhe-os/megakernel:latest, arkhe-os/megakernel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
