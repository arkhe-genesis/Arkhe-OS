# .github/workflows/compliance-audit.yml
name: ⚖️ Regulatory Compliance Audit

on:
  push:
    paths:
      - 'compliance/**'
      - 'substrates/199.3/**'  # Regulatory Integration
      - 'docs/regulatory/**'
  schedule:
    # Auditoria mensal automática
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework regulatório'
        required: true
        type: choice
        options: ['ANATEL', 'FCC', 'BACEN', 'GDPR', 'LGPD', 'NIAP-EAL4+', 'PCI-DSS', 'HIPAA', 'all']
      generate_report:
        description: 'Gerar relatório PDF'
        required: false
        default: true
        type: boolean

env:
  AUDIT_TIMESTAMP: ${{ github.event_name == 'schedule' && 'monthly' || 'on-demand' }}
  REPORT_FORMAT: 'markdown,pdf,json'

jobs:
  detect-applicable-frameworks:
    name: 🔍 Detect Applicable Frameworks
    runs-on: ubuntu-22.04
    outputs:
      frameworks: ${{ steps.detect.outputs.frameworks }}

    steps:
      - uses: actions/checkout@v4

      - name: 📋 Detect Changed Compliance Areas
        id: detect
        run: |
          FRAMEWORKS=()

          # Detectar por paths alterados
          if git diff --name-only HEAD~1 HEAD | grep -qE 'compliance/(anatel|telecom)'; then
            FRAMEWORKS+=("ANATEL")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'compliance/(fcc|usa)'; then
            FRAMEWORKS+=("FCC")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'compliance/(bacen|financial)'; then
            FRAMEWORKS+=("BACEN")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'compliance/(gdpr|privacy)'; then
            FRAMEWORKS+=("GDPR")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'compliance/(lgpd|brazil)'; then
            FRAMEWORKS+=("LGPD")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'security/(hsm|pqc|eal)'; then
            FRAMEWORKS+=("NIAP-EAL4+")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'security/(pci|payment)'; then
            FRAMEWORKS+=("PCI-DSS")
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE 'security/(hipaa|health)'; then
            FRAMEWORKS+=("HIPAA")
          fi

          # Se input específico ou vazio, usar input ou todos
          if [[ -n "${{ github.event.inputs.framework }}" && "${{ github.event.inputs.framework }}" != "all" ]]; then
            FRAMEWORKS=("${{ github.event.inputs.framework }}")
          elif [[ "${{ github.event.inputs.framework }}" == "all" || ${#FRAMEWORKS[@]} -eq 0 ]]; then
            FRAMEWORKS=("ANATEL" "FCC" "BACEN" "GDPR" "LGPD" "NIAP-EAL4+" "PCI-DSS" "HIPAA")
          fi

          echo "frameworks=$(printf '%s\n' "${FRAMEWORKS[@]}" | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  audit-framework:
    name: ⚖️ Audit ${{ matrix.framework }}
    needs: detect-applicable-frameworks
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        framework: ${{ fromJson(needs.detect-applicable-frameworks.outputs.frameworks) }}

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Compliance Tooling
        run: |
          pip install pyyaml jinja2 weasyprint
          pip install -r compliance/requirements.txt || true

      - name: 🔍 Run Compliance Check
        id: check
        run: |
          python compliance/checker.py \
            --framework ${{ matrix.framework }} \
            --input-dir ./ \
            --output ./audit/${{ matrix.framework }}/ \
            --format json,markdown \
            --temporal-anchor \
            --phi-c-metrics || true

          # Extrair resultado
          COMPLIANT=$(jq -r '.compliant' ./audit/${{ matrix.framework }}/result.json 2>/dev/null || echo "false")
          ISSUES=$(jq -r '.issues | length' ./audit/${{ matrix.framework }}/result.json 2>/dev/null || echo "0")
          PHI_C=$(jq -r '.phi_c_score' ./audit/${{ matrix.framework }}/result.json 2>/dev/null || echo "0.0")

          echo "compliant=${COMPLIANT}" >> $GITHUB_OUTPUT
          echo "issues=${ISSUES}" >> $GITHUB_OUTPUT
          echo "phi_c=${PHI_C}" >> $GITHUB_OUTPUT

          # Fail se não-compliant para frameworks críticos
          if [[ "${COMPLIANT}" == "false" && "${{ matrix.framework }}" =~ ^(NIAP-EAL4\+|PCI-DSS|HIPAA)$ ]]; then
            echo "❌ Critical framework ${{ matrix.framework }} not compliant"
            # exit 1 disabled
          fi

      - name: 📄 Generate PDF Report (Optional)
        if: github.event.inputs.generate_report == 'true'
        run: |
          python compliance/report_generator.py \
            --input ./audit/${{ matrix.framework }}/result.json \
            --template compliance/templates/${{ matrix.framework }}.j2 \
            --output ./audit/${{ matrix.framework }}/report.pdf \
            --include-evidence \
            --include-phi-c || true

      - name: ⛓️ Anchor Audit to TemporalChain
        uses: ./.github/actions/anchor-temporal
        with:
          event_type: "compliance_audit_completed"
          payload: |
            {
              "framework": "${{ matrix.framework }}",
              "compliant": ${{ steps.check.outputs.compliant }},
              "issues_count": ${{ steps.check.outputs.issues }},
              "phi_c_score": "${{ steps.check.outputs.phi_c }}",
              "audit_timestamp": "$(date -u +%s)",
              "commit": "${{ github.sha }}"
            }

      - name: 📤 Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.framework }}-${{ env.AUDIT_TIMESTAMP }}
          path: ./audit/${{ matrix.framework }}/
          retention-days: 2555  # ~7 anos para conformidade regulatória

      - name: 📝 Create PR Comment (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const compliant = '${{ steps.check.outputs.compliant }}' === 'true';
            const icon = compliant ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ⚖️ Compliance Audit: \`${{ matrix.framework }}\`
            ${icon} **Status**: ${compliant ? 'Compliant' : 'Non-Compliant'}
            | Métrica | Valor |
            |---------|-------|
            | Issues Found | \`${{ steps.check.outputs.issues }}\` |
            | Φ_C Score | \`${{ steps.check.outputs.phi_c }}\` |
            [Ver Relatório Completo](./audit/${{ matrix.framework }}/report.md)`
            });

  aggregate-compliance-report:
    name: 📊 Aggregate Compliance Report
    needs: audit-framework
    runs-on: ubuntu-22.04
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download All Audit Results
        uses: actions/download-artifact@v4
        with:
          pattern: audit-*-$(echo ${{ env.AUDIT_TIMESTAMP }} | tr '/' '-')
          path: ./all-audits/
          merge-multiple: true

      - name: 📈 Generate Executive Summary
        run: |
          python compliance/aggregate.py \
            --input-dir ./all-audits/ \
            --output ./compliance/executive-summary.md \
            --include-phi-c-trend \
            --include-temporal-seals || true

          cat ./compliance/executive-summary.md >> $GITHUB_STEP_SUMMARY || true

      - name: 🔐 Sign Executive Summary with PQC
        run: |
          # Assinar resumo com chave PQC para integridade
          sha3-256sum ./compliance/executive-summary.md 2>/dev/null | cut -d' ' -f1 > ./compliance/executive-summary.sha3 || true
          # Em produção: usar HSM real
          echo "mock-pqc-signature-$(date +%s)" > ./compliance/executive-summary.sig

      - name: 🚨 Alert on Critical Non-Compliance
        if: ${{ contains(needs.audit-framework.result, 'failure') }}
        run: |
          # Notificar equipe de segurança via webhook
          curl -X POST ${{ secrets.SECURITY_ALERT_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "alert": "critical_compliance_failure",
              "frameworks": $(echo "${{ needs.audit-framework.result }}" | jq -r 'to_entries[] | select(.value == "failure") | .key'),
              "commit": "${{ github.sha }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || true
