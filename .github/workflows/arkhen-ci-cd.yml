env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Arkhe(n) Sovereign Multi-Cloud CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  CORE_IMAGE_NAME: ${{ github.repository }}/arkhe-core
  RELAYER_IMAGE_NAME: ${{ github.repository }}/arkhe-relayer
  TZINOR_GATE_STRICT: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-scan:
    name: 🛡️ Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          lfs: false
      - name: Pull LFS objects
        run: # git lfs pull
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: ''
      - name: Install Dependencies
        run: echo "No npm package.json, skipping"
      - name: Run Lint
        run: # npm run lint
      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1' # Fails the build on critical vulnerabilities
          severity: 'CRITICAL'

  build-and-verify:
    name: 🧪 Build & Verify
    needs: lint-and-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        lfs: false
    
    - name: Pull LFS objects
      run: # git lfs pull
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: ''

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Subagent Techne: Orchestrate Build (Makefile)
      run: make build
      
    - name: Subagent Aletheia: Verify Integrity
      run: make verify-integrity
      
    - name: Subagent Kairos: Performance & Coherence Tests
      run: make test

  sign-binaries:
    name: 🖋️ Code Signing
    needs: build-and-verify
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          lfs: false
      - name: Pull LFS objects
        run: # git lfs pull
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/

      - name: Sign macOS Binaries
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          chmod +x scripts/signing/sign_macos.sh
          ./scripts/signing/sign_macos.sh dist/Arkhe-macOS.dmg "$APPLE_ID" "$TEAM_ID" "$APP_SPECIFIC_PASSWORD" "$SIGNING_IDENTITY"

      - name: Sign Windows Binaries
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          CERT_THUMBPRINT: ${{ secrets.WIN_CERT_THUMBPRINT }}
        run: |
          ./scripts/signing/sign_windows.ps1 -TargetDir dist/ -CertThumbprint "$env:CERT_THUMBPRINT"

  docker-publish:
    name: 🔨 Forjar e Publicar Containers
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        lfs: false
    - name: Pull LFS objects
      run: # git lfs pull
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login no Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Metadata (Core)
      id: meta-core
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.CORE_IMAGE_NAME }}
        tags: |
          type=sha
          type=ref,event=branch
          type=ref,event=tag
          latest

    - name: Extract Metadata (Relayer)
      id: meta-relayer
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.RELAYER_IMAGE_NAME }}
        tags: |
          type=sha
          type=ref,event=branch
          type=ref,event=tag
          latest

    - name: Build & Push Arkhe Core
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-core.outputs.tags }}
        labels: ${{ steps.meta-core.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & Push Arkhe Relayer
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.relayer
        push: true
        tags: ${{ steps.meta-relayer.outputs.tags }}
        labels: ${{ steps.meta-relayer.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-subagents:
    name: 🜏 Subagent Orchestration
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        lfs: false
    - name: Pull LFS objects
      run: # git lfs pull
    - name: Subagent Skopos: Coordinate Deployment & Hermes Distribution
      run: |
        DIST_FLAG=""
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          DIST_FLAG="--distribute"
        fi
        python3 scripts/subagent_deploy.py --target production $DIST_FLAG

  deploy-multi-cloud:
    name: ☁️ Multi-Cloud Materialization
    needs: deploy-subagents
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        lfs: false
    - name: Pull LFS objects
      run: # git lfs pull
    - name: Deploy to AWS EKS & GCP GKE
      run: |
        echo "🜏 Applying manifests to AWS EKS (Primary)..."
        # kubectl apply -f k8s/
        echo "🜏 Applying manifests to GCP GKE (Secondary)..."
        # kubectl apply -f k8s/
