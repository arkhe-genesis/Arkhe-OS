name: Arkhe Integrated Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-ontology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download ROBOT
        run: |
          wget https://github.com/ontodev/robot/releases/download/v1.9.6/robot.jar
          wget https://raw.githubusercontent.com/ontodev/robot/master/bin/robot
          chmod +x robot
          sudo mv robot /usr/local/bin/
          sudo mv robot.jar /usr/local/bin/
      - name: ROBOT Validate
        run: |
          robot reason --reasoner HermiT --input src/arkhe_core/ontology/arkhe_ontology.owl --output inferred.owl
          robot verify --queries tests/sparql/*.rq --input src/arkhe_core/ontology/arkhe_ontology.owl
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rdflib
      - name: SemVer Diff
        run: |
          python3 scripts/owl_semver_diff.py src/arkhe_core/ontology/arkhe_ontology.owl src/arkhe_core/ontology/arkhe_ontology.owl
