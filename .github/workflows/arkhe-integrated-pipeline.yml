env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Arkhe Integrated Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-ontology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Pull LFS objects
        run: # git lfs pull
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download ROBOT
        run: |
          wget https://github.com/ontodev/robot/releases/download/v1.9.6/robot.jar
          wget https://raw.githubusercontent.com/ontodev/robot/master/bin/robot
          chmod +x robot
          sudo mv robot /usr/local/bin/
          sudo mv robot.jar /usr/local/bin/
      - name: ROBOT Validate
        run: |
          robot reason --reasoner HermiT --input src/arkhe_core/ontology/arkhe_ontology.owl --output inferred.owl
          robot verify --queries tests/sparql/*.rq --input src/arkhe_core/ontology/arkhe_ontology.owl
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rdflib
      - name: SemVer Diff + Security Gate + Architecture Gate
        id: semver
        run: |
          python3 scripts/owl_semver_diff.py src/arkhe_core/ontology/arkhe_ontology.owl src/arkhe_core/ontology/arkhe_ontology.owl > semver.json
          cat semver.json
          IMPACT=$(python3 -c "import json; d=json.load(open('semver.json')); print(d['semver'])")
          echo "impact=$IMPACT" >> $GITHUB_OUTPUT

          if [ "$IMPACT" = "ARCHITECTURAL_MAJOR" ]; then
            echo "::error::Mudança arquitetural detectada (ARCHITECTURAL_MAJOR). Toda forma degenerada requer justificativa Cliffordiana."
            exit 4
          elif [ "$IMPACT" = "SECURITY_MAJOR" ]; then
            echo "::error::Mudança de superfície de ameaça detectada (SECURITY_MAJOR). Requer aprovação do Guardião da Forja."
            exit 3
          elif [ "$IMPACT" = "MAJOR" ]; then
            echo "::error::Breaking change detectado. Requer aprovação manual."
            exit 2
          fi
