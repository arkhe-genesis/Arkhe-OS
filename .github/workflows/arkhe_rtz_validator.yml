env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Arkhe RTZ Validator

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          lfs: false

      - name: Pull LFS objects
        run: # git lfs pull
      - name: Arkhe Pattern Check (RTZ)
        run: |
          echo "Starting RTZ (Refusal to Zero) validation on Markdown files..."
          VIOLATIONS=0

          # Find all markdown files, ignoring node_modules and .git
          # Ensure they have at least 50 lines and contain the word 'Summary' (or alternative structure validation)
          # We'll use a slightly more tolerant checking logic to adapt to various SOPs,
          # but log if it fails the strict RTZ minimums.

          while read -r file; do
            # Skip empty lines
            if [ -z "$file" ]; then continue; fi

            lines=$(wc -l < "$file")

            # Use grep -q to check quietly
            if [ "$lines" -lt 50 ] || ! grep -iq "Summary" "$file"; then
              echo "::warning file=$file::RTZ Violation: '$file' has $lines lines (needs 50+) or is missing a 'Summary' section."
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/\.git/*")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "$VIOLATIONS files failed the RTZ minimum coherence check."
            # Uncomment the next line to strictly fail the build if violations are found
            # exit 1
          else
            echo "All checked files meet the RTZ coherence floor."
          fi
