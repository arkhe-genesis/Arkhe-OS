env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Compile and run tests

permissions: read-all

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    name: Tests on ${{ matrix.os }} with node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - 24
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          lfs: false
          fetch-depth: 2

      - name: Pull LFS objects
        run: # git lfs pull
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: ""
          node-version: 24 # build works only with 24+

      - name: Install dependencies
        shell: bash
        run: echo "No npm package.json, skipping"

      - name: Build
        run: echo "No npm package.json, skipping"
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: ""
          node-version: ${{ matrix.node }}

      - name: Disable AppArmor
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Run tests
        shell: bash
        # Retry tests if they fail in the merge queue.
        run: echo 'No npm package.json, skipping tests'

  # Gating job for branch protection.
  test-success:
    name: '[Required] Tests passed'
    runs-on: ubuntu-latest
    needs: run-tests
    if: ${{ !cancelled() }}
    steps:
      - if: ${{ needs.run-tests.result != 'success' }}
        run: 'exit 1'
      - run: 'exit 0'
