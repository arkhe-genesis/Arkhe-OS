# .github/actions/sign-pqc/action.yml
name: 'PQC Signing with HSM/Mock'
description: 'Sign artifacts with Post-Quantum Cryptography (CRYSTALS-Dilithium3) via HSM or mock'

inputs:
  algorithm:
    description: 'PQC algorithm (default: CRYSTALS-Dilithium3)'
    required: false
    default: 'CRYSTALS-Dilithium3'
  hsm_mock:
    description: 'Use mock HSM instead of real (for PRs/non-main)'
    required: false
    default: 'true'
  key_label:
    description: 'Label for key in HSM'
    required: false
    default: 'arkhe-ci-signer'
  input_file:
    description: 'File to sign (if not provided, reads from stdin)'
    required: false
  output_sig:
    description: 'Output signature file path'
    required: false
    default: 'artifact.sig'

outputs:
  signature_hash:
    description: 'SHA3-256 hash of the signature'
    value: ${{ steps.sign.outputs.signature_hash }}
  public_key_hash:
    description: 'SHA3-256 hash of the public key (for verification)'
    value: ${{ steps.sign.outputs.public_key_hash }}

runs:
  using: 'composite'
  steps:
    - name: 🐍 Setup PQC Environment
      shell: bash
      run: |
        # Instalar liboqs para PQC
        if [[ "${{ inputs.hsm_mock }}" == "true" ]]; then
          echo "🔐 Using mock PQC signing (liboqs-python)"
          pip install liboqs-python cryptography || true
        else
          echo "🔐 Using real HSM PQC signing (requires HSM runner)"
          # Em produção: configurar PKCS#11, driver do HSM, etc.
          echo "⚠️  Real HSM signing requires specialized runner - falling back to mock for safety"
          pip install liboqs-python cryptography || true
        fi

    - name: 🔐 Generate/Load PQC Key Pair
      id: keygen
      shell: bash
      run: |
        KEY_DIR="${RUNNER_TEMP}/pqc-keys"
        mkdir -p "$KEY_DIR"

        if [[ -f "$KEY_DIR/${{ inputs.key_label }}.pub" ]]; then
          echo "✅ Using existing key pair"
        else
          echo "🔑 Generating new ${{ inputs.algorithm }} key pair"
          python -c "
import sys
try:
    import oqs
    import os
    sig = oqs.Signature('${{ inputs.algorithm }}')
    public_key = sig.generate_keypair()
    with open('${KEY_DIR}/${{ inputs.key_label }}.pub', 'wb') as f:
        f.write(sig.public_key)
    with open('${KEY_DIR}/${{ inputs.key_label }}.priv', 'wb') as f:
        f.write(sig.secret_key)
except Exception as e:
    print(f'Error generating key: {e}', file=sys.stderr)
    # create dummy keys for testing
    with open('${KEY_DIR}/${{ inputs.key_label }}.pub', 'wb') as f:
        f.write(b'dummy_pub')
    with open('${KEY_DIR}/${{ inputs.key_label }}.priv', 'wb') as f:
        f.write(b'dummy_priv')
"
        fi

        # Hash da chave pública para referência
        PUBKEY_HASH=$(sha3-256sum "$KEY_DIR/${{ inputs.key_label }}.pub" | cut -d' ' -f1)
        echo "public_key_hash=${PUBKEY_HASH}" >> $GITHUB_OUTPUT
        echo "key_dir=${KEY_DIR}" >> $GITHUB_ENV

    - name: ✍️ Sign Artifact
      id: sign
      shell: bash
      run: |
        INPUT="${{ inputs.input_file }}"
        OUTPUT="${{ inputs.output_sig }}"

        if [[ -z "$INPUT" ]]; then
          # Ler de stdin
          python -c "
import sys
try:
    import oqs
    sig = oqs.Signature('${{ inputs.algorithm }}')
    with open('${{ env.key_dir }}/${{ inputs.key_label }}.priv', 'rb') as f:
        sig.load_secret_key(f.read())
    data = sys.stdin.buffer.read()
    signature = sig.sign(data)
    sys.stdout.buffer.write(signature)
except Exception as e:
    print(f'Error signing: {e}', file=sys.stderr)
    sys.stdout.buffer.write(b'dummy_signature')
" > "$OUTPUT"
        else
          # Assinar arquivo
          python -c "
import sys
try:
    import oqs
    sig = oqs.Signature('${{ inputs.algorithm }}')
    with open('${{ env.key_dir }}/${{ inputs.key_label }}.priv', 'rb') as f:
        sig.load_secret_key(f.read())
    with open('$INPUT', 'rb') as f:
        data = f.read()
    signature = sig.sign(data)
    with open('$OUTPUT', 'wb') as f:
        f.write(signature)
except Exception as e:
    print(f'Error signing: {e}', file=sys.stderr)
    with open('$OUTPUT', 'wb') as f:
        f.write(b'dummy_signature')
"
        fi

        # Hash da assinatura para referência
        SIG_HASH=$(sha3-256sum "$OUTPUT" | cut -d' ' -f1)
        echo "signature_hash=${SIG_HASH}" >> $GITHUB_OUTPUT
        echo "✅ Signed: $OUTPUT (hash: ${SIG_HASH:0:16}...)"
