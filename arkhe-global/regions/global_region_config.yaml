# ── Global Routing & Latency Matrix ──
routing:
  latency_budget_ms:
    constitutional_critical: 20
    constitutional_standard: 50
    constitutional_bulk: 150
    non_constitutional: 500

  geodesic_weights:
    # Weight for geodesic distance in routing decisions (0-1)
    primary_selection: 0.4
    secondary_selection: 0.3
    fallback_selection: 0.2

  phi_c_reputation_decay:
    # How quickly Φ_C reputation decays without recent anchoring
    half_life_hours: 24
    minimum_reputation: 0.80

# ── Constitutional Enforcement Global Policy ──
constitutional_global:
  invariant_enforcement:
    ghost_invariant_global: 0.577553  # Never below this anywhere
    loopseal_global: 0.349066         # π/9 consistency threshold
    sovereign_gap_global: 0.9999      # Never reach 1.0 anywhere

  cross_region_consensus:
    voting_mechanism: "phi_c_weighted_majority"
    minimum_participating_regions: 5
    timeout_seconds: 30
    fallback_mode: "safe_mode_with_local_enforcement"

  temporal_chain_global:
    anchor_aggregation_interval_minutes: 5
    global_seal_algorithm: "sha3_256_merkle_tree"
    verification_nodes: ["sa-east-1", "us-east-1", "eu-west-1", "ap-northeast-1"]
