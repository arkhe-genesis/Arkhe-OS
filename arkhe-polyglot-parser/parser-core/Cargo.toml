[package]
name = "parser-core"
version = "5.0.0"
edition = "2021"
description = "ARKHE Ω-TEMP — Polymath-Polyglot Parser Core"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = { version = "0.4", optional = true }
serde_json = "1.0"
petgraph = "0.6"
regex = "1.10"
ahash = "0.8"
bitflags = "2.0"
unicode-segmentation = "1.11"
chrono = "0.4"
sha3 = "0.10"
thiserror = "1.0"
once_cell = "1.19"
wasmtime = { version = "18.0", optional = true }

[features]
default = ["wasm-bindgen"]
wasm = ["wasm-bindgen", "js-sys", "serde-wasm-bindgen"]
