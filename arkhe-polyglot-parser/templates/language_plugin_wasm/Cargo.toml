[package]
name = "arkhe-language-plugin"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.4"
serde_json = "1.0"
# Link com parser-core via path ou crate publicada
# Usando default-features = false pois não precisamos do CLI etc aqui.
arkhe-polyglot-parser = { path = "../../parser-core", default-features = false }

nexus-sdk = { workspace = true, optional = true }
nexus-core = { workspace = true, optional = true }
nexus-network = { workspace = true, optional = true }

[profile.release]
opt-level = "z"
lto = true
strip = true
