# config/v730/qpu-firmware-crd.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: quantumfirmwares.arkhe.io
spec:
  group: arkhe.io
  names:
    kind: QuantumFirmware
    listKind: QuantumFirmwareList
    plural: quantumfirmwares
    singular: quantumfirmware
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              pulse_schedule:
                type: string
              calibration_data:
                type: string
              phi_c_feedback:
                type: boolean
