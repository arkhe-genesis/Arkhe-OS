# torrc.d/webrtc.conf — Configuração Tor para WebRTC anônimo
# Circuitos dedicados para sinalização WebRTC
CircuitPriorityHalflife 30
MaxCircuitDirtiness 600

# Hidden Service para signaling WebRTC
HiddenServiceDir /var/lib/tor/webrtc_signal
HiddenServiceVersion 3
HiddenServicePort 8443 127.0.0.1:8443
HiddenServiceAuthorizeClient stealth webrtc-peer,webrtc-viewer

# Isolamento de stream por circuito
IsolateClientAddr 1
IsolateSOCKSAuth 1
IsolateClientProtocol 1
IsolateDestPort 1

# Proteção contra fingerprinting
FingerprintResistant 1
ReducedConnectionPadding 1