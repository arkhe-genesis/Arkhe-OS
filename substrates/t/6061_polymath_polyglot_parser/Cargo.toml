[package]
name = "arkp-polyglot"
version = "6.8.0"
edition = "2021"

[dependencies]
parser-core = { path = "../arkhe-polyglot-parser/parser-core" }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"
sha3 = "0.10"
ahash = "0.8"
thiserror = "2.0.18"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "main"
path = "benchmarks/main.rs"
harness = false
