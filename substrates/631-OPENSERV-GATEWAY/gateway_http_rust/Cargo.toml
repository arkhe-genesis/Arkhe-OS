[package]
name = "openserv-gateway"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
actix-rt = "2"
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha3 = "0.10"
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rand = "0.8"
hex = "0.4"
chrono = "0.4"

[workspace]
