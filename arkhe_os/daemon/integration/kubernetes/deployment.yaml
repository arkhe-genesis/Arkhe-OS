apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkhe-agi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arkhe-agi
  template:
    metadata:
      labels:
        app: arkhe-agi
    spec:
      containers:
      - name: arkhe-agi
        image: arkhe-agi:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
