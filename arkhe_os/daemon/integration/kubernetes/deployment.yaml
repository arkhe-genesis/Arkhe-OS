apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkhe-agi
  labels:
    app: arkhe-agi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arkhe-agi
  template:
    metadata:
      labels:
        app: arkhe-agi
    spec:
      containers:
      - name: arkhe-agi
        image: arkhe-os/agi-daemon:latest
        ports:
        - containerPort: 3000
        - containerPort: 9090
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          limits:
            memory: "4Gi"
            cpu: "2"
          requests:
            memory: "2Gi"
            cpu: "1"
        image: arkhe-agi:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
