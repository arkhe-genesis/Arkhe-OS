syntax = "proto3";

package oracle;

message CreateShardRequest {
    string substrate_id = 1;
    string motor = 2;
    bool gpu = 3;
    map<string, string> labels = 4;
}

message CreateShardResponse {
    string shard_id = 1;
}

service Oracle {
    rpc CreateShard(CreateShardRequest) returns (CreateShardResponse);
}
